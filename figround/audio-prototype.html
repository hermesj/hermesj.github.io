<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure and Ground — Audio</title>
<meta name="description" content="Figure and Ground — audio version with crossfade between Odysseus and the Siren.">
<meta property="og:title" content="Figure and Ground — Audio">
<meta property="og:description" content="Audio version — crossfade between the voices of Odysseus and the Siren.">
<meta property="og:image" content="https://hermesj.github.io/figround/images/og-image-audio-en.png">
<meta property="og:url" content="https://hermesj.github.io/figround/audio-prototype.html">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="figround.css">
<link rel="stylesheet" href="audio-shared.css">
<style>
  /* Simple-Mode specifics.
     Shared chip controls, hint box, back-link, mobile base → audio-shared.css.
     Play button SVG icons + updatePlayButton()            → audio-shared.js.  */

  /* ── PROGRESS (local: simple mode has no strophe-bars overflow) ── */
  .progress-container {
    width: 100%;
    margin-bottom: 0.8em;
    position: relative;
  }
  .progress-bar-bg {
    width: 100%;
    height: 3px;
    background: rgba(120,140,160,0.25);
    border-radius: 2px;
    overflow: hidden;
    cursor: pointer;
  }
  /* timeCurrent/timeDuration: colors via .color-ody / .color-sir */

  /* ── PERSPECTIVE TOGGLE (simple mode: smaller, softer palette) ── */
  .perspective-toggle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.4);
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.35s ease;
    box-shadow: 0 0 12px rgba(0,0,0,0.4), 0 0 24px rgba(0,0,0,0.15);
  }
  .perspective-toggle.mode-odysseus {
    background: radial-gradient(circle at 40% 40%, #e4eaf0, #a8b8c8);
    border-color: rgba(255,255,255,0.5);
  }
  .perspective-toggle.mode-siren {
    background: radial-gradient(circle at 40% 40%, #5a6a7a, #2a3a4a);
    border-color: rgba(255,255,255,0.3);
  }

  /* Ticker text colors (audio-shared.css supplies only font-weight + glow). */
  .ticker-text-odysseus { color: #000; }
  .ticker-text-siren    { color: #fff; }
</style>
</head>
<body>

<div class="main-title">
  <span class="word-left color-ody" id="titleLeft">Figure</span>
  <span class="word-mid" id="titleMid">and</span>
  <span class="word-right color-sir" id="titleRight">Ground</span>
</div>

<div class="audio-stage">

  <div class="speaker-row">
    <span class="speaker-left color-ody-strong">Odysseus</span>
    <span class="speaker-right color-sir-strong">The Siren</span>
  </div>

  <!-- Crossfade slider -->
  <div class="slider-container">
    <div class="slider-track-bg"></div>
    <input type="range" id="crossfade" min="0" max="100" value="50" step="1">
  </div>

  <div class="volume-indicators">
    <span class="vol-label vol-left color-ody" id="volLeft">100 %</span>
    <span class="vol-label vol-right color-sir" id="volRight">100 %</span>
  </div>

  <div class="hint-row">
    <span class="hint">Move the slider to shift between perspectives. Headphones recommended.</span>
  </div>

  <!-- Transport -->
  <div class="transport">
    <button class="btn btn-lang active" id="btnDe" onclick="switchLang('de')">Deutsch</button>
    <button class="btn btn-play" id="btnPlay" onclick="togglePlay()" disabled>
      <span class="btn-icon" id="btnPlayIcon" aria-hidden="true"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"><path d="M6 4.5 L16 10 L6 15.5 Z"/></svg></span>
      <span class="btn-label" id="btnPlayLabel">Play</span>
    </button>
    <button class="btn btn-lang" id="btnEn" onclick="switchLang('en')">English</button>
  </div>

  <!-- Loading -->
  <div class="loading-bar" id="loadingBar">
    <div class="loading-bar-fill" id="loadingFill"></div>
  </div>
  <div class="status" id="status">Loading audio files …</div>

  <!-- Progress -->
  <div class="progress-container">
    <div class="progress-bar-bg" id="progressBg" onclick="seek(event)">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="time-row">
      <span id="timeCurrent" class="color-ody">0:00</span>
      <span id="timeDuration" class="color-sir">—</span>
    </div>
  </div>

</div>

<!-- Text tickers with perspective toggle -->
<div class="ticker-row">
  <div class="ticker ticker-odysseus" id="tickerOdy">
    <div class="ticker-text ticker-text-odysseus color-ody" id="tickerTextOdy"></div>
  </div>
  <button class="perspective-toggle mode-odysseus" id="perspToggle" onclick="togglePerspective()" title="Perspektive wechseln"></button>
  <div class="ticker ticker-siren" id="tickerSir">
    <div class="ticker-text ticker-text-siren color-sir" id="tickerTextSir"></div>
  </div>
</div>

<div class="back-link">
  <a href="index.html">Project Overview</a>
  <a href="audio-prototype-2.html">Advanced Mode</a>
</div>

<div class="scroll-hint" id="scrollHint"><span>&#x25BE;</span> scroll <span>&#x25BE;</span></div>

<script src="figround.js"></script>
<script src="audio-timestamps.js"></script>
<script src="audio-shared.js"></script>
<script>
// ── Init ──

async function init() {
  // Wait for texts to load from JSON
  const texts = await FIGROUND.ready;

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Create panner nodes (stereo positioning)
  panners.odysseus = audioCtx.createStereoPanner();
  panners.siren = audioCtx.createStereoPanner();
  panners.odysseus.pan.setValueAtTime(PAN_ODYSSEUS_BASE, audioCtx.currentTime);
  panners.siren.pan.setValueAtTime(PAN_SIREN_BASE, audioCtx.currentTime);

  // Create gain nodes
  gains.odysseus = audioCtx.createGain();
  gains.siren = audioCtx.createGain();

  // Signal chain: source → gain → panner → destination
  gains.odysseus.connect(panners.odysseus);
  gains.siren.connect(panners.siren);
  panners.odysseus.connect(audioCtx.destination);
  panners.siren.connect(audioCtx.destination);

  // Apply initial crossfade (50/50)
  updateCrossfade(50);

  // Load all audio files
  const loadingBar = document.getElementById('loadingBar');
  const loadingFill = document.getElementById('loadingFill');
  loadingBar.classList.add('visible');

  loadedCount = 0;

  async function loadFile(lang, voice) {
    try {
      const url = AUDIO_FILES[lang][voice];
      const resp = await fetch(url);
      const arrayBuf = await resp.arrayBuffer();
      const decoded = await audioCtx.decodeAudioData(arrayBuf);
      buffers[lang][voice] = decoded;
      loadedCount++;
      loadingFill.style.width = (loadedCount / totalFiles * 100) + '%';
    } catch (e) {
      console.error(`Failed to load ${lang} ${voice}:`, e);
    }
  }

  // Load both languages in parallel
  await Promise.all([
    loadFile('de', 'odysseus'),
    loadFile('de', 'siren'),
    loadFile('en', 'odysseus'),
    loadFile('en', 'siren'),
  ]);

  loadingBar.classList.remove('visible');
  document.getElementById('status').textContent = '';
  document.getElementById('btnPlay').disabled = false;

  // Apply detected language to UI
  FIGROUND.updateTitle(currentLang, ' — Audio');
  document.querySelector('.speaker-right').textContent = currentLang === 'de' ? 'Die Sirene' : 'The Siren';
  document.getElementById('btnDe').classList.toggle('active', currentLang === 'de');
  document.getElementById('btnEn').classList.toggle('active', currentLang === 'en');

  initTickers();
  updateDuration();
}

// ── Crossfade control ──

function updateCrossfade(value) {
  // value: 0 = full Odysseus, 100 = full Siren
  // Equal-power crossfade
  const x = value / 100;
  const gainOdy = Math.cos(x * Math.PI / 2);
  const gainSir = Math.sin(x * Math.PI / 2);

  gains.odysseus.gain.setValueAtTime(gainOdy, audioCtx.currentTime);
  gains.siren.gain.setValueAtTime(gainSir, audioCtx.currentTime);

  // Dynamic stereo panning: unfocused voice drifts further to its side
  if (panners.odysseus && panners.siren) {
    const panOdy = PAN_ODYSSEUS_BASE * (1 + x * 0.6);
    const panSir = PAN_SIREN_BASE * (1 + (1 - x) * 0.6);
    panners.odysseus.pan.setValueAtTime(Math.max(-1, panOdy), audioCtx.currentTime);
    panners.siren.pan.setValueAtTime(Math.min(1, panSir), audioCtx.currentTime);
  }

  document.getElementById('volLeft').textContent = Math.round(gainOdy * 100) + ' %';
  document.getElementById('volRight').textContent = Math.round(gainSir * 100) + ' %';

  document.getElementById('volLeft').style.opacity = 0.4 + gainOdy * 0.6;
  document.getElementById('volRight').style.opacity = 0.4 + gainSir * 0.6;
}

document.getElementById('crossfade')?.addEventListener('input', (e) => {
  updateCrossfade(e.target.value);
});

// ── Playback ──

function startPlayback(offset = 0) {
  stopSources();

  sources.odysseus = audioCtx.createBufferSource();
  sources.siren = audioCtx.createBufferSource();

  sources.odysseus.buffer = buffers[currentLang].odysseus;
  sources.siren.buffer = buffers[currentLang].siren;

  sources.odysseus.connect(gains.odysseus);
  sources.siren.connect(gains.siren);

  sources.odysseus.start(0, offset);
  sources.siren.start(0, offset);
  startTime = audioCtx.currentTime - offset;
  isPlaying = true;
}

// ── Progress update loop ──

function updateProgress() {
  const cur = getCurrentTime();
  const dur = getMaxDuration();
  const pct = dur > 0 ? Math.min(cur / dur, 1) : 0;

  if (isPlaying) {
    document.getElementById('progressFill').style.width = (pct * 100) + '%';
    document.getElementById('timeCurrent').textContent = formatTime(cur);
  }

  // Always update tickers (also when paused, for seek)
  updateTickers(cur);

  requestAnimationFrame(updateProgress);
}

requestAnimationFrame(updateProgress);

// ── Seek ──

function seek(e) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const rect = document.getElementById('progressBg').getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const dur = getMaxDuration();
  const target = Math.max(0, Math.min(x * dur, dur));

  if (isPlaying) {
    stopSources();
    startPlayback(target);
  } else {
    pauseOffset = target;
    document.getElementById('timeCurrent').textContent = formatTime(target);
    document.getElementById('progressFill').style.width = (target / dur * 100) + '%';
  }
}

// ── Language switch ──

function switchLang(lang) {
  if (lang === currentLang) return;

  const wasPlaying = isPlaying;
  const offset = getCurrentTime();

  if (isPlaying) {
    stopSources();
    isPlaying = false;
  }

  currentLang = lang;
  pauseOffset = 0; // reset to start when switching language

  document.getElementById('btnDe').classList.toggle('active', lang === 'de');
  document.getElementById('btnEn').classList.toggle('active', lang === 'en');

  // Update title and speaker labels
  FIGROUND.updateTitle(lang, ' — Audio');
  document.querySelector('.speaker-right').textContent = lang === 'de' ? 'Die Sirene' : 'The Siren';

  // Reset play button (SVG + label)
  updatePlayButton();

  updateDuration();
  document.getElementById('timeCurrent').textContent = '0:00';
  document.getElementById('progressFill').style.width = '0%';
  initTickers();
  updateTickers(0);

  if (wasPlaying) {
    startPlayback(0);
    updatePlayButton();
  }
}

// ── Start ──

init();
</script>

</body>
</html>
