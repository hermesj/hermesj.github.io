<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure and Ground — Focus</title>
<meta name="description" content="Interactive reading view — gyroscope, touch, or mouse control the focus and visibility of both texts.">
<meta property="og:title" content="Figure and Ground — Focus">
<meta property="og:description" content="Interactive reading view — gyroscope, touch, or mouse control the focus and visibility of both texts.">
<meta property="og:image" content="https://hermesj.github.io/figround/images/og-image-focus-en.png">
<meta property="og:url" content="https://hermesj.github.io/figround/figure-ground-focus.html">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="figround.css">
<style>
  body {
    min-height: 100vh;
    overflow-x: hidden;
    cursor: none;
  }

  /* ── CUSTOM CURSOR ── */
  .cursor-dot {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(180,180,180,0.6);
    pointer-events: none;
    z-index: 1000;
    transform: translate(-50%, -50%);
    transition: opacity 0.3s;
    mix-blend-mode: difference;
  }

  /* ── LANG SWITCH ── */
  .lang-switch {
    padding: 1.5vh 0 0.5vh 0;
    cursor: default;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    column-gap: 2.2em;
    row-gap: 0.2em;
  }

  .switch-group {
    display: inline-flex;
    align-items: center;
  }

  .lang-switch a {
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    text-decoration: none;
    color: #0f1926;          /* Toggles: darkest blue */
    cursor: pointer;
    padding: 0.2em 0.5em;
    transition: color 0.2s;
  }

  .lang-switch a:hover {
    color: #000;
  }

  .lang-switch a.active {
    color: #0f1926;
    border-bottom: 1px solid rgba(15, 25, 38, 0.6);
  }

  .lang-switch .nav-link {
    color: #e4eaf0;          /* Project Overview: lightest blue */
  }

  .lang-switch .nav-link:hover {
    color: #ffffff;
  }

  /* Alignment toggle: only meaningful on viewports where the
     asymmetric (vertical-aligned) grid actually kicks in. */
  @media (max-width: 800px) {
    .switch-group.align-group { display: none; }
  }

  /* Alignment toggle uses the lighter nav-link palette to match
     Project Overview and sit visually apart from the language pair. */
  .lang-switch .align-group a {
    color: #e4eaf0;
  }
  .lang-switch .align-group a:hover {
    color: #ffffff;
  }
  .lang-switch .align-group a.active {
    color: #e4eaf0;
    border-bottom: 1px solid rgba(228, 234, 240, 0.6);
  }

  /* ── TITLE (override base padding) ── */
  .main-title {
    padding: 0.5vh 0 1.5vh 0;
  }

  /* hint-overlay base is in figround.css */

  .hint-inner {
    display: flex;
    align-items: center;
    gap: 1.5em;
  }

  .hint-arrow {
    font-size: 3.5rem;
    color: rgba(160,170,180,0.8);
    animation: hint-pulse 1s ease-in-out infinite;
  }

  .hint-arrow-left { animation-delay: 0.2s; }
  .hint-arrow-right { animation-delay: 0.4s; }

  @keyframes hint-pulse {
    0%, 100% { opacity: 0.4; transform: translateX(0); }
    50% { opacity: 0.9; transform: translateX(-6px); }
  }

  .hint-arrow-right {
    animation-name: hint-pulse-right;
  }

  @keyframes hint-pulse-right {
    0%, 100% { opacity: 0.4; transform: translateX(0); }
    50% { opacity: 0.9; transform: translateX(6px); }
  }

  .hint-icon {
    width: 72px;
    height: 72px;
    opacity: 0.8;
  }

  /* subtitle-row base is in figround.css */

  .subtitle-ody,
  .subtitle-sir {
    font-size: clamp(1.05rem, 1.4vw, 1.5rem);
    font-weight: 600;
    font-style: italic;
    letter-spacing: 0.06em;
    transition: filter 0.15s ease, opacity 0.15s ease;
  }

  .subtitle-ody {
    color: #000;
    text-shadow: 0 0 10px rgba(255,255,255,0.9), 0 0 20px rgba(255,255,255,0.5);
  }

  .subtitle-sir {
    position: absolute;
    top: 0;
    right: 4vw;
    color: #fff;
    text-shadow: 0 0 10px rgba(0,0,0,0.9), 0 0 20px rgba(0,0,0,0.5);
  }

  /* text-stage, text-layer, and end-spacer base are in figround.css */

  .text-layer {
    transition: filter 0.15s ease, opacity 0.15s ease;
  }

  /* Odysseus layer */
  .layer-odysseus {
    position: relative;
    color: #000;
    font-weight: 600;
    text-shadow:
      0 0 8px rgba(255,255,255,0.9),
      0 0 18px rgba(255,255,255,0.5);
  }

  /* Siren layer — overlaid on top */
  .layer-siren {
    position: absolute;
    top: 0;
    left: 4vw;
    right: 4vw;
    color: #fff;
    font-weight: 400;
    text-shadow:
      0 0 8px rgba(0,0,0,0.9),
      0 0 18px rgba(0,0,0,0.5);
  }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    body { cursor: default; }
    .cursor-dot { display: none; }
    /* text-layer mobile font-size is in figround.css */
    .hint-icon { width: 90px; height: 90px; }
    .hint-arrow { font-size: 3.5rem; }

    /* Subtitles larger on mobile — but not so large they break
       "Die Sirene. Ein Versuch." into awkward wraps on small phones. */
    .subtitle-ody,
    .subtitle-sir { font-size: 1.25rem; }

    /* German title only: "Figur und" left, "Hintergrund" right on next line */
    .main-title.title-de {
      flex-wrap: wrap;
      justify-content: flex-start;
      padding-left: 4vw;
      padding-right: 4vw;
    }
    .title-de .word-right {
      flex-basis: 100%;
      text-align: right;
    }
  }

  /* ── TABLET (iPad portrait + landscape, up to iPad Pro 11") ──
     Without this, the desktop clamp() falls through to ~0.85rem
     because 1.1vw stays below the 1.05rem cap on iPad widths. */
  @media (min-width: 769px) and (max-width: 1200px) {
    body { cursor: default; }
    .cursor-dot { display: none; }

    /* Bump text size close to the phone value so reading distance matches */
    .text-layer { font-size: 1.2rem !important; }

    /* Halve side padding and widen the stage — iPads have plenty of pixels */
    .text-stage,
    .subtitle-row {
      max-width: 820px;
      padding-left: 2vw;
      padding-right: 2vw;
    }
    .layer-siren { left: 2vw; right: 2vw; }
    .subtitle-sir { right: 2vw; }

    .subtitle-ody,
    .subtitle-sir { font-size: 1.3rem; }
  }

  /* ── DESKTOP — VERTICAL ALIGNED MODE ──
     Opt-in layout where the two voices end at the same vertical line
     rather than sharing equal column width.
       · Siren:    68% wide, horizontally centered on the stage
       · Odysseus: 42% wide, sharing Siren's left edge
       → Siren extends ~26% past Odysseus on the right.
     Both texts overlap where they share the left region; the focus/blur
     cross-fade still governs which voice is legible.

     Grid columns 16 / 42 / 26 / 16 give us those exact positions:
       · Odysseus spans column 2 (42%).
       · Siren    spans columns 2–3 (42% + 26% = 68%).
       · Cols 1 and 4 are equal margins → Siren is centered.

     Activated only on viewports wide enough (>800px) AND only when the
     user selects "vertical aligned" via the toggle (body.layout-vertical). */
  @media (min-width: 801px) {
    body.layout-vertical .text-stage,
    body.layout-vertical .subtitle-row {
      max-width: 1100px;
      display: grid;
      /* Identical column track on both grids — guarantees the
         Siren subtitle's right edge lines up with the Siren text's
         right edge, and Odysseus-subtitle left with Odysseus-text left. */
      grid-template-columns: 16fr 42fr 26fr 16fr;
    }

    body.layout-vertical .layer-odysseus,
    body.layout-vertical .layer-siren {
      grid-row: 1;
    }

    body.layout-vertical .layer-odysseus {
      grid-column: 2;
      /* position: relative stays from base */
    }

    body.layout-vertical .layer-siren {
      grid-column: 2 / span 2;
      /* Drop the mobile/tablet absolute positioning so the grid
         takes over sizing + placement. */
      position: relative;
      top: auto;
      left: auto;
      right: auto;
    }

    /* Subtitles live in the same grid cells as their voices */
    body.layout-vertical .subtitle-ody {
      grid-column: 2;
      grid-row: 1;
    }
    body.layout-vertical .subtitle-sir {
      grid-column: 3;
      grid-row: 1;
      text-align: right;
      /* Override base absolute positioning so the grid places it */
      position: relative;
      top: auto;
      right: auto;
    }
  }
</style>
</head>
<body>

<div class="cursor-dot" id="cursorDot"></div>

<!-- Hint overlay — centered on screen, fades on interaction -->
<div class="hint-overlay" id="hint">
  <div class="hint-inner">
    <span class="hint-arrow hint-arrow-left">&#x25C0;</span>
    <svg class="hint-icon" id="hintIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: rgba(160,170,180,0.8);">
      <rect x="6" y="2" width="12" height="20" rx="6"/>
      <line x1="12" y1="6" x2="12" y2="10"/>
      <line x1="3" y1="12" x2="6" y2="12"/>
      <line x1="18" y1="12" x2="21" y2="12"/>
    </svg>
    <span class="hint-arrow hint-arrow-right">&#x25B6;</span>
  </div>
</div>

<div class="lang-switch" id="langSwitch">
  <span class="switch-group">
    <a id="btnDe" onclick="switchLang('de')">Deutsch</a>
    <a id="btnEn" class="active" onclick="switchLang('en')">English</a>
  </span>
  <span class="switch-group">
    <a href="index.html" class="nav-link" data-en="Project Overview" data-de="Projektübersicht">Project Overview</a>
  </span>
  <span class="switch-group align-group">
    <a id="btnAlignH" class="active" onclick="switchAlign('horizontal')" data-en="Horizontal aligned" data-de="Horizontal ausgerichtet">Horizontal aligned</a>
    <a id="btnAlignV" onclick="switchAlign('vertical')" data-en="Vertical aligned" data-de="Vertikal ausgerichtet">Vertical aligned</a>
  </span>
</div>

<div class="main-title">
  <span class="word-left" id="titleLeft">Figure</span>
  <span class="word-mid" id="titleMid">and</span>
  <span class="word-right" id="titleRight">Ground</span>
</div>

<div class="subtitle-row">
  <span class="subtitle-ody" id="subOdy"></span>
  <span class="subtitle-sir" id="subSir"></span>
</div>

<div class="text-stage" id="stage">
  <div class="text-layer layer-odysseus" id="layerOdy"></div>
  <div class="text-layer layer-siren" id="layerSir"></div>
</div>

<div class="end-spacer"></div>

<script src="figround.js"></script>
<script>
FIGROUND.ready.then(function (texts) {
  var layerOdy = document.getElementById('layerOdy');
  var layerSir = document.getElementById('layerSir');
  var subOdy = document.getElementById('subOdy');
  var subSir = document.getElementById('subSir');
  var cursorDot = document.getElementById('cursorDot');
  var hint = document.getElementById('hint');
  var fadeHint = FIGROUND.createHintFader(hint);

  var currentX = 0.5;
  var targetX = 0.5;
  var animating = false;
  var isMobile = FIGROUND.isMobile;
  var currentLang = 'en';

  // Swap hint icon for mobile (phone tilt instead of mouse)
  if (isMobile) {
    document.getElementById('hintIcon').innerHTML =
      '<rect x="7" y="2" width="10" height="20" rx="2"/>' +
      '<line x1="12" y1="18" x2="12" y2="18.5" stroke-linecap="round"/>' +
      '<path d="M4 8 L7 5" /><path d="M20 8 L17 5" />';
  }

  function lerp(a, b, t) { return a + (b - a) * t; }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  var stage = document.getElementById('stage');

  // Ensure stage height accommodates the absolutely-positioned siren layer
  function fitStage() {
    var h = Math.max(layerOdy.scrollHeight, layerSir.scrollHeight);
    stage.style.minHeight = h + 'px';
  }
  window.addEventListener('resize', fitStage);

  // ── Language switching ──
  window.switchLang = function (lang) {
    currentLang = lang;
    var data = texts[lang];
    FIGROUND.updateTitle(lang, ' \u2014 Focus');
    subOdy.textContent = data.odysseus.subtitle;
    subSir.textContent = data.siren.subtitle;
    layerOdy.innerHTML = FIGROUND.renderParagraphs(data.odysseus.paragraphs);
    layerSir.innerHTML = FIGROUND.renderParagraphs(data.siren.paragraphs);
    document.getElementById('btnDe').className = (lang === 'de') ? 'active' : '';
    document.getElementById('btnEn').className = (lang === 'en') ? 'active' : '';
    // Localize labels that use data-en / data-de attributes
    var els = document.querySelectorAll('[data-' + lang + ']');
    for (var i = 0; i < els.length; i++) {
      // Preserve .active class on alignment buttons; only swap textContent.
      els[i].textContent = els[i].getAttribute('data-' + lang);
    }
    // German title wrapping (mobile only, handled via CSS)
    var titleEl = document.querySelector('.main-title');
    titleEl.classList.toggle('title-de', lang === 'de');
    // Refit stage height after content change
    requestAnimationFrame(fitStage);
  };

  // ── Alignment mode switching ──
  // horizontal = equal-width columns (default, both voices same width)
  // vertical   = asymmetric grid where voices end at the same bottom line
  //              (only renders on viewports >= 1201px; toggle is hidden below)
  window.switchAlign = function (mode) {
    document.body.classList.toggle('layout-vertical', mode === 'vertical');
    document.body.classList.toggle('layout-horizontal', mode === 'horizontal');
    document.getElementById('btnAlignH').className =
      (mode === 'horizontal') ? 'active' : '';
    document.getElementById('btnAlignV').className =
      (mode === 'vertical') ? 'active' : '';
    // Layout change affects layer heights → refit stage
    requestAnimationFrame(fitStage);
  };

  // ── Background gradient shift ──
  function buildGradient(x) {
    var range = isMobile ? 200 : 60;
    var shift = (0.5 - x) * range;
    var lo = isMobile ? -200 : -5;
    var hi = isMobile ?  300 : 105;
    var s0 = clamp(0 + shift, lo, hi);
    var s1 = clamp(12 + shift, lo, hi);
    var s2 = clamp(38 + shift, lo, hi);
    var s3 = clamp(68 + shift, lo, hi);
    var s4 = clamp(100 + shift, lo, hi);
    return 'linear-gradient(to right,' +
      '#ffffff ' + s0 + '%,' +
      '#f0f2f5 ' + s1 + '%,' +
      '#98a8b8 ' + s2 + '%,' +
      '#3a4d66 ' + s3 + '%,' +
      '#0f1926 ' + s4 + '%)';
  }

  // ── Focus / blur ──
  function applyFocus(x) {
    var odyBlur = clamp((x - 0.15) * 8, 0, 5);
    var odyOpacity = clamp(1 - (x - 0.2) * 0.9, 0.08, 1);

    var sirBlur = clamp((0.85 - x) * 8, 0, 5);
    var sirOpacity = clamp(1 - (0.8 - x) * 0.9, 0.08, 1);

    layerOdy.style.filter = 'blur(' + odyBlur.toFixed(1) + 'px)';
    layerOdy.style.opacity = odyOpacity.toFixed(3);

    layerSir.style.filter = 'blur(' + sirBlur.toFixed(1) + 'px)';
    layerSir.style.opacity = sirOpacity.toFixed(3);

    subOdy.style.filter = 'blur(' + odyBlur.toFixed(1) + 'px)';
    subOdy.style.opacity = odyOpacity.toFixed(3);
    subSir.style.filter = 'blur(' + sirBlur.toFixed(1) + 'px)';
    subSir.style.opacity = sirOpacity.toFixed(3);

    document.body.style.background = buildGradient(x);
  }

  // ── Animation loop ──
  function tick() {
    currentX = lerp(currentX, targetX, 0.10);
    if (Math.abs(currentX - targetX) < 0.0005) {
      currentX = targetX;
      animating = false;
    }
    applyFocus(currentX);
    if (animating) requestAnimationFrame(tick);
  }

  function startAnimation() {
    if (!animating) {
      animating = true;
      requestAnimationFrame(tick);
    }
  }

  // ── Desktop: mouse ──
  document.addEventListener('mousemove', function (e) {
    fadeHint();
    cursorDot.style.left = e.clientX + 'px';
    cursorDot.style.top = e.clientY + 'px';
    targetX = e.clientX / window.innerWidth;
    startAnimation();
  });

  // ── Mobile: gyroscope + touch ──
  if (isMobile) {
    var gyroAvailable = false;
    var useTouch = false;
    var touchTimer = null;

    // ── Touch: always active, overrides gyro while touching ──
    function onTouch(e) {
      fadeHint();
      useTouch = true;
      clearTimeout(touchTimer);
      targetX = e.touches[0].clientX / window.innerWidth;
      startAnimation();
    }
    function onTouchEnd() {
      // Resume gyro after last touch (25 s)
      touchTimer = setTimeout(function () { useTouch = false; }, 25000);
    }
    document.addEventListener('touchstart', onTouch, { passive: true });
    document.addEventListener('touchmove', onTouch, { passive: true });
    document.addEventListener('touchend', onTouchEnd, { passive: true });

    // ── Gyroscope: adapts axis to screen orientation ──
    if (window.DeviceOrientationEvent) {
      function handleOrientation(e) {
        if (useTouch || e.gamma === null) return;
        if (!gyroAvailable) {
          gyroAvailable = true;
          fadeHint();
        }
        // Pick the correct axis for left-right tilt
        var angle = (screen.orientation && screen.orientation.angle) ||
                    window.orientation || 0;
        var tilt;
        if (angle === 90) {
          tilt = -e.beta;       // landscape, home button right
        } else if (angle === -90 || angle === 270) {
          tilt = e.beta;        // landscape, home button left
        } else {
          tilt = e.gamma;       // portrait (0 or 180)
        }
        tilt = clamp(tilt, -30, 30);
        targetX = (tilt + 30) / 60;
        startAnimation();
      }

      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        // iOS: hint must be tappable to request permission
        hint.style.pointerEvents = 'auto';
        hint.style.cursor = 'pointer';
        hint.addEventListener('click', function () {
          DeviceOrientationEvent.requestPermission().then(function (state) {
            if (state === 'granted') {
              window.addEventListener('deviceorientation', handleOrientation, true);
              hint.style.pointerEvents = '';
              hint.style.cursor = '';
              setTimeout(fadeHint, 2000);
            }
          }).catch(console.error);
        }, { once: true });
      } else {
        window.addEventListener('deviceorientation', handleOrientation, true);
      }
    }
  }

  // ── Init: detect language from URL or browser ──
  switchLang(FIGROUND.detectLang());
  switchAlign('horizontal');
  applyFocus(0.5);
});
</script>

</body>
</html>
