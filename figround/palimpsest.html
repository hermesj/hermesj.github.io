<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure and Ground — Palimpsest</title>
<meta name="description" content="Figure and Ground — palimpsest view. Touch the surface to reveal the hidden text beneath.">
<meta property="og:title" content="Figure and Ground — Palimpsest">
<meta property="og:description" content="Touch the surface to reveal the hidden text beneath.">
<meta property="og:image" content="https://hermesj.github.io/figround/images/tile-palimpsest-en.jpg">
<meta property="og:url" content="https://hermesj.github.io/figround/palimpsest.html">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="figround.css">
<style>
  body {
    background: linear-gradient(to right,
      #f4f4f4 0%,
      #e4eaf0 12%,
      #98a8b8 38%,
      #3a4d66 68%,
      #0f1926 100%
    );
    min-height: 100vh;
    overflow-x: hidden;
    cursor: none;
    /* On touch devices, vertical scrolling happens exclusively via the
       dedicated chevron buttons — drags on the body stay as reveal
       gestures only. Pinch-zoom remains enabled for accessibility. */
    touch-action: pinch-zoom;
  }

  /* Desktop per-mode body gradient.
     The default gradient above runs the full light→dark drama from pure
     white to near-black. When the active mode pins black surface text on
     the right side (Odysseus mode) or white surface text on the left
     (Siren mode), that extreme contrast fights legibility. So we tame the
     extreme *opposite* to the voice's text color, while keeping the other
     end of the gradient untouched:
       • Odysseus → black text on surface: right end caps at #3a4d66
         (the original 68 % stop) instead of plunging to #0f1926, so the
         dark half stays readable.
       • Siren → white text on surface: left end starts at #7a8ca0
         (a mid-tone) instead of #f4f4f4, so the light half doesn't
         wash out the type — but stays light enough that the left
         side doesn't read as a flat dark band.
     The two halves meet around the original midpoint, so the visual
     impression of the gradient as a whole is preserved.
     Mobile / tablet override these inside their touch media queries
     (with !important + their own gentler ramps), so this block only
     governs the desktop (pointer:fine) experience. */
  .mode-odysseus {
    background: linear-gradient(to right,
      #f4f4f4 0%,
      #e4eaf0 12%,
      #98a8b8 38%,
      #5a6e84 70%,
      #3a4d66 100%
    );
  }
  .mode-siren {
    background: linear-gradient(to right,
      #7a8ca0 0%,
      #4a5e72 30%,
      #1a2838 65%,
      #0f1926 100%
    );
  }

  /* ── REVEAL WASH ──
     Full-viewport tint that's revealed by the SAME circular mask the
     hidden-text layer uses. Inside the text column it just strengthens
     the "lit" feel; past the column edges — where there is no hidden
     text for the mask to expose — the wash gives the illumination cone
     somewhere to land, so the circle stays visibly round instead of
     being cropped by the text boundary.
     z-index sits between body and the cursor-ring puddle (1000); the
     ring tint layers on top of the wash, the revealed text on top of
     everything. */
  .reveal-wash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    -webkit-mask-image: radial-gradient(circle 0px at 0px 0px, black 0%, transparent 100%);
    mask-image: radial-gradient(circle 0px at 0px 0px, black 0%, transparent 100%);
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
    transition: background 0.3s ease;
  }

  /* Tint is subtle — just enough to carry the cone past the text
     boundary. The softness comes from the JS mask below, which uses
     a continuous radial fade (no solid inner disc) so the wash reads
     as a gradient, not a bordered circle. */
  .mode-odysseus .reveal-wash { background: rgba(15,25,38,0.10); }
  .mode-siren    .reveal-wash { background: rgba(245,248,252,0.10); }

  /* ── CUSTOM CURSOR ──
     Sized via --ring-size so media queries only need to bump the var.
     Centered via negative margins rather than transform: translate()
     — a fixed + transform element gets its own compositor layer on
     iOS Safari and some Chrome Android builds, which then stacks on
     top of the hidden text regardless of z-index. */
  .cursor-ring {
    /* Sized to the reveal radius (REVEAL_RADIUS = 120 in JS) * 2 so the
       puddle is always exactly as wide as the revealed hidden-text circle.
       If the ring were smaller (e.g. 160 we had before), the visible zone
       would look larger inside the text column — where revealed text
       extends the illusion out to the reveal radius — and smaller past
       the column edge, where only the narrower puddle remains. That
       mismatch reads as the cone "going flat" at the text boundary. */
    --ring-size: 240px;
    position: fixed;
    width: var(--ring-size);
    height: var(--ring-size);
    margin-left: calc(-0.5 * var(--ring-size));
    margin-top: calc(-0.5 * var(--ring-size));
    border-radius: 50%;
    pointer-events: none;
    z-index: 1000;
    transition: opacity 0.3s, border-color 0.4s ease;
  }

  /* Desktop "flashlight cone" — no border, just a radial fade so the
     cursor looks like a soft pool of light rather than a bordered
     disc. Touch modes below re-add a crisper edge since a finger-sized
     ring needs a more defined silhouette. */
  .mode-odysseus .cursor-ring {
    border: none;
    background: radial-gradient(circle,
      rgba(15,25,38,0.45) 0%,
      rgba(15,25,38,0.30) 45%,
      rgba(15,25,38,0.15) 75%,
      rgba(15,25,38,0.06) 92%,
      transparent 100%);
  }

  .mode-siren .cursor-ring {
    border: none;
    background: radial-gradient(circle,
      rgba(245,248,252,0.45) 0%,
      rgba(245,248,252,0.30) 45%,
      rgba(245,248,252,0.15) 75%,
      rgba(245,248,252,0.06) 92%,
      transparent 100%);
  }

  /* ── TITLE ── */
  .main-title {
    padding: 0.6em 0 0.4em 0;
  }

  /* subtitle-row base is in figround.css. Palimpsest centers both
     subtitles (surface + hidden) regardless of mode or layout. */
  .subtitle-row {
    text-align: center;
  }

  .subtitle-surface,
  .subtitle-hidden {
    font-size: clamp(1.05rem, 1.4vw, 1.5rem);
    font-weight: 600;
    font-style: italic;
    letter-spacing: 0.06em;
    transition: opacity 0.4s ease;
  }

  .subtitle-hidden {
    position: absolute;
    top: -0.6em; /* half-line offset like the text layers */
    left: 4vw;
    right: 4vw;   /* spans the full row so text-align:center works */
    /* Above the cursor ring (z-index 1000) so the revealed subtitle
       isn't dimmed by the puddle tint. */
    z-index: 1001;
  }

  /* text-stage, text-layer, and end-spacer base are in figround.css */

  /* Half-line offset so hidden text doesn't overlap surface text exactly */
  .layer-hidden {
    margin-top: -0.975em; /* half of line-height (1.95 / 2) */
  }

  /* ── SURFACE LAYER (fully visible) ── */
  .layer-surface {
    position: relative;
  }

  /* ── HIDDEN LAYER (revealed by cursor) ── */
  .layer-hidden {
    position: absolute;
    top: 0;
    left: 4vw;
    right: 4vw;
    /* Above the cursor ring (z-index 1000): the puddle tint sits
       between body gradient and surface text, not on top of the
       revealed hidden text. */
    z-index: 1001;
    /* mask is set dynamically via JS */
    -webkit-mask-image: radial-gradient(circle 0px at 0px 0px, black 0%, transparent 100%);
    mask-image: radial-gradient(circle 0px at 0px 0px, black 0%, transparent 100%);
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
    transition: none;
  }

  /* ── VERTICAL ALIGNED MODE ──
     Only Odysseus narrows in vertical mode: a 55%-wide centered column.
     The 55% is tuned so Odysseus runs roughly the same number of lines
     as the Siren (which keeps the full stage width) — i.e. both voices
     end at about the same vertical position.
     Siren extends symmetrically past Odysseus on both sides.
     The .voice-odysseus / .voice-siren class is set in render() on both
     layers and flips on swap. Only active on viewports >800px. */
  @media (min-width: 801px) {
    /* Surface layer (position:relative) — center via margin auto. */
    body.layout-vertical .layer-surface.voice-odysseus {
      max-width: 55%;
      margin-left: auto;
      margin-right: auto;
    }

    /* Hidden layer (position:absolute) — center via left/right offsets.
       For Odysseus 55%, each side gets (100 - 55) / 2 = 22.5%. */
    body.layout-vertical .layer-hidden.voice-odysseus {
      left: 22.5%;
      right: 22.5%;
    }
  }

  /* ── MODE: ODYSSEUS ON TOP ── */
  .mode-odysseus .layer-surface,
  .mode-odysseus .subtitle-surface {
    color: #000;
    font-weight: 600;
    text-shadow:
      0 0 8px rgba(255,255,255,0.9),
      0 0 18px rgba(255,255,255,0.5);
  }

  .mode-odysseus .layer-hidden,
  .mode-odysseus .subtitle-hidden {
    color: #fff;
    font-weight: 400;
    text-shadow:
      0 0 8px rgba(0,0,0,0.9),
      0 0 18px rgba(0,0,0,0.5);
  }

  /* ── MODE: SIREN ON TOP ── */
  .mode-siren .layer-surface,
  .mode-siren .subtitle-surface {
    color: #fff;
    font-weight: 400;
    text-shadow:
      0 0 8px rgba(0,0,0,0.9),
      0 0 18px rgba(0,0,0,0.5);
  }

  .mode-siren .layer-hidden,
  .mode-siren .subtitle-hidden {
    color: #000;
    font-weight: 600;
    text-shadow:
      0 0 8px rgba(255,255,255,0.9),
      0 0 18px rgba(255,255,255,0.5);
  }

  /* ── MOBILE ──
     Gated on pointer:coarse so a desktop user with a narrow browser
     window doesn't accidentally get the touch styles (hard circle,
     scroll arrows, per-mode gradient). Phones always match. */
  @media (max-width: 768px) and (pointer: coarse) {
    body { cursor: default; }
    /* Ring doubled and shifted in JS so bottom edge sits on the finger */
    .cursor-ring {
      --ring-size: 260px;
      opacity: 0;
      /* Faster than the desktop 0.3 s — on a touch device the user is
         actively looking for the cone, so the delay to peak opacity reads
         as lag. */
      transition: opacity 0.12s ease, border-color 0.4s ease;
    }
    .cursor-ring.touch-active { opacity: 1; }
    /* text-layer mobile font-size is in figround.css */
    .subtitle-surface,
    .subtitle-hidden { font-size: 1.25rem; }

    /* German title only: "Figur und" on first line, "Hintergrund"
       on a second line, right-aligned. Same pattern as focus view. */
    .main-title.title-de {
      flex-wrap: wrap;
      justify-content: flex-start;
      padding-left: 4vw;
      padding-right: 4vw;
    }
    .title-de .word-right {
      flex-basis: 100%;
      text-align: right;
    }

    /* Stronger cursor tint on mobile: acts as a local contrast "puddle"
       for the revealed hidden text. Dark puddle under white Siren,
       light puddle under black Odysseus. */
    .mode-odysseus .cursor-ring {
      border: 1px solid rgba(15,25,38,0.7);
      background: radial-gradient(circle,
        rgba(15,25,38,0.75) 0%,
        rgba(15,25,38,0.45) 55%,
        transparent 100%);
    }
    .mode-siren .cursor-ring {
      border: 1px solid rgba(245,248,252,0.8);
      background: radial-gradient(circle,
        rgba(245,248,252,0.8) 0%,
        rgba(245,248,252,0.45) 55%,
        transparent 100%);
    }

    /* Stronger halo for hidden text on mobile, so the revealed voice
       stays legible where its color fights the gradient side:
       white Siren on the light left, black Odysseus on the dark right. */
    .mode-odysseus .layer-hidden,
    .mode-odysseus .subtitle-hidden {
      text-shadow:
        0 0 10px rgba(0,0,0,1),
        0 0 22px rgba(0,0,0,0.8),
        0 0 40px rgba(0,0,0,0.4);
    }
    .mode-siren .layer-hidden,
    .mode-siren .subtitle-hidden {
      text-shadow:
        0 0 10px rgba(255,255,255,1),
        0 0 22px rgba(255,255,255,0.8),
        0 0 40px rgba(255,255,255,0.4);
    }

    /* Narrower gradient range per mode so text stays readable at edges */
    .mode-odysseus {
      background: linear-gradient(to right,
        #f4f4f4 0%,
        #e4eaf0 12%,
        #98a8b8 40%,
        #6a7d90 70%,
        #4a5e72 100%
      ) !important;
    }
    .mode-siren {
      background: linear-gradient(to right,
        #4a5e72 0%,
        #3a4d66 30%,
        #2a3c52 60%,
        #1a2838 85%,
        #0f1926 100%
      ) !important;
    }
  }

  /* ── TABLET (iPad portrait + landscape, up to iPad Pro 11") ──
     Mirrors the tablet treatment of figure-ground-focus.html:
     bigger text, slimmer margins, wider stage — plus the mobile
     per-mode gradient and stronger cursor tint, since iPads are
     touch devices too.
     Gated on pointer:coarse so the block only matches on actual
     touch devices. Without that gate, a desktop laptop with a
     narrow window (<=1200 CSS-px, which happens on many MacBooks
     at 100% zoom) would incorrectly get the hard-circle tablet
     mode instead of the soft flashlight cone. */
  @media (min-width: 769px) and (max-width: 1200px) and (pointer: coarse) {
    body { cursor: default; }
    /* Ring doubled and shifted in JS so bottom edge sits on the finger */
    .cursor-ring {
      --ring-size: 260px;
      opacity: 0;
    }
    .cursor-ring.touch-active { opacity: 1; }

    .text-layer { font-size: 1.2rem !important; }
    .text-stage,
    .subtitle-row {
      max-width: 820px;
      padding-left: 2vw;
      padding-right: 2vw;
    }
    .layer-hidden { left: 2vw; right: 2vw; }
    .subtitle-hidden { left: 2vw; right: 2vw; }

    .subtitle-surface,
    .subtitle-hidden { font-size: 1.3rem; }

    /* Stronger cursor tint — same as mobile */
    .mode-odysseus .cursor-ring {
      border: 1px solid rgba(15,25,38,0.7);
      background: radial-gradient(circle,
        rgba(15,25,38,0.75) 0%,
        rgba(15,25,38,0.45) 55%,
        transparent 100%);
    }
    .mode-siren .cursor-ring {
      border: 1px solid rgba(245,248,252,0.8);
      background: radial-gradient(circle,
        rgba(245,248,252,0.8) 0%,
        rgba(245,248,252,0.45) 55%,
        transparent 100%);
    }

    /* Stronger halo for hidden text — same as mobile */
    .mode-odysseus .layer-hidden,
    .mode-odysseus .subtitle-hidden {
      text-shadow:
        0 0 10px rgba(0,0,0,1),
        0 0 22px rgba(0,0,0,0.8),
        0 0 40px rgba(0,0,0,0.4);
    }
    .mode-siren .layer-hidden,
    .mode-siren .subtitle-hidden {
      text-shadow:
        0 0 10px rgba(255,255,255,1),
        0 0 22px rgba(255,255,255,0.8),
        0 0 40px rgba(255,255,255,0.4);
    }

    /* Per-mode gradient — same as mobile */
    .mode-odysseus {
      background: linear-gradient(to right,
        #f4f4f4 0%,
        #e4eaf0 12%,
        #98a8b8 40%,
        #6a7d90 70%,
        #4a5e72 100%
      ) !important;
    }
    .mode-siren {
      background: linear-gradient(to right,
        #4a5e72 0%,
        #3a4d66 30%,
        #2a3c52 60%,
        #1a2838 85%,
        #0f1926 100%
      ) !important;
    }
  }

  /* ── SCROLL ARROWS (touch only) ──
     Dedicated chevrons handle vertical scrolling, since the rest of the
     surface is reserved for the reveal gesture. Hidden by default —
     shown only when there's content to scroll in that direction, and
     only on touch-capable viewports (mobile + tablet). */
  .scroll-arrow {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    width: 48px;
    height: 48px;
    display: none;           /* toggled to 'flex' on touch viewports only */
    align-items: center;
    justify-content: center;
    background: rgba(30, 40, 55, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 24px;
    color: rgba(245, 248, 252, 0.95);
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, background 0.2s ease, transform 0.15s ease;
    z-index: 1500;           /* above cursor-ring (1000) + layer-hidden (1001) */
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  .scroll-arrow.visible {
    opacity: 0.85;
    pointer-events: auto;
  }

  .scroll-arrow:active {
    background: rgba(30, 40, 55, 0.8);
    transform: translateX(-50%) scale(0.92);
  }

  .scroll-arrow svg {
    width: 22px;
    height: 22px;
    display: block;
  }

  .scroll-arrow-up   { top: 12px; }
  .scroll-arrow-down { bottom: 12px; }

  /* Only show the buttons on touch-capable viewports.
     Desktop scrolls with wheel/trackpad as usual — gated on
     pointer:coarse so a narrow-window desktop doesn't get them. */
  @media (max-width: 1200px) and (pointer: coarse) {
    .scroll-arrow { display: flex; }
  }
</style>
</head>
<body class="mode-odysseus">

<!-- Full-viewport wash — gives the reveal cone something to land on
     past the text column edges. See .reveal-wash CSS above. -->
<div class="reveal-wash" id="revealWash"></div>
<div class="cursor-ring" id="cursorRing"></div>

<div class="main-title">
  <span class="word-left" id="titleLeft">Figure</span>
  <span class="word-mid" id="titleMid">and</span>
  <span class="word-right" id="titleRight">Ground</span>
</div>

<div class="subtitle-row" id="subtitleRow">
  <span class="subtitle-surface" id="subSurface"></span>
  <span class="subtitle-hidden" id="subHidden"></span>
</div>

<div class="text-stage" id="stage">
  <div class="text-layer layer-surface" id="layerSurface"></div>
  <div class="text-layer layer-hidden" id="layerHidden"></div>
</div>

<div class="end-spacer"></div>

<!-- Scroll arrows (touch devices only; hidden on desktop via media query) -->
<button class="scroll-arrow scroll-arrow-up" id="scrollUp" aria-label="Scroll up">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="6 15 12 9 18 15"></polyline>
  </svg>
</button>
<button class="scroll-arrow scroll-arrow-down" id="scrollDown" aria-label="Scroll down">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="6 9 12 15 18 9"></polyline>
  </svg>
</button>

<script src="figround.js"></script>
<script>
// Inject shared header / footer / explanation synchronously so the
// btnDe/btnEn/swapBtn/btnAlignH/btnAlignV IDs exist by the time the
// view's switchLang/switchAlign/swapLayers handlers run.
FIGROUND.injectHeader({
  showSwap: true,
  swapHandler: 'swapLayers',
  showAlignment: true,
  explanation: {
    en: 'Beneath the surface, you’ll find another perspective. Use the mouse or touch to discover it.',
    de: 'Unter der Oberfläche findest Du eine weitere Perspektive. Nutze Mouse oder Berührung, um sie zu finden.'
  }
});

FIGROUND.ready.then(function (texts) {
  var layerSurface = document.getElementById('layerSurface');
  var layerHidden = document.getElementById('layerHidden');
  var subSurface = document.getElementById('subSurface');
  var subHidden = document.getElementById('subHidden');
  var cursorRing = document.getElementById('cursorRing');
  var revealWash = document.getElementById('revealWash');
  var explanation = document.getElementById('sharedExplanation');
  var stage = document.getElementById('stage');
  // The shared explanation slab takes the role of the previous hint
  // overlay — fade it on first interaction.
  var fadeHint = explanation
    ? FIGROUND.createHintFader(explanation)
    : function () {};

  var currentLang = FIGROUND.detectLang();
  // 'odysseus' = Odysseus text on surface, Siren hidden beneath
  var surfaceVoice = 'odysseus';

  var isMobile = FIGROUND.isMobile;

  // Reveal radius
  // Reveal radius matches the visual ring radius on touch devices
  // (ring diameter 260 → radius 130), so the illuminated text spans
  // the full ring rather than a smaller inner circle.
  var REVEAL_RADIUS = isMobile ? 130 : 120;
  var REVEAL_EDGE = 60; // soft edge in px

  // Track mouse/touch position relative to the stage
  var pointerX = -9999;
  var pointerY = -9999;
  var pointerActive = false;

  // ── Render ──

  function render() {
    var data = texts[currentLang];
    var surface = surfaceVoice === 'odysseus' ? data.odysseus : data.siren;
    var hidden = surfaceVoice === 'odysseus' ? data.siren : data.odysseus;

    FIGROUND.updateTitle(currentLang, ' — Palimpsest');
    // German title wraps on mobile ("Figur und" / "Hintergrund")
    document.querySelector('.main-title').classList.toggle('title-de', currentLang === 'de');

    subSurface.textContent = surface.subtitle;
    subHidden.textContent = hidden.subtitle;
    layerSurface.innerHTML = FIGROUND.renderParagraphs(surface.paragraphs);
    layerHidden.innerHTML = FIGROUND.renderParagraphs(hidden.paragraphs);

    // Voice classes drive the vertical-aligned layout (Odysseus narrow,
    // Siren wider). Classes flip whenever swap toggles surfaceVoice.
    layerSurface.classList.toggle('voice-odysseus', surfaceVoice === 'odysseus');
    layerSurface.classList.toggle('voice-siren',    surfaceVoice === 'siren');
    layerHidden.classList.toggle('voice-odysseus',  surfaceVoice === 'siren');
    layerHidden.classList.toggle('voice-siren',     surfaceVoice === 'odysseus');

    document.getElementById('btnDe').className = (currentLang === 'de') ? 'active' : '';
    document.getElementById('btnEn').className = (currentLang === 'en') ? 'active' : '';

    // Preserve mode classes on body, but reapply fresh in case alignment
    // classes were added separately. layout-horizontal / layout-vertical
    // is managed by switchAlign() and shouldn't be clobbered here, so we
    // only touch the mode-* classes.
    document.body.classList.toggle('mode-odysseus', surfaceVoice === 'odysseus');
    document.body.classList.toggle('mode-siren',    surfaceVoice === 'siren');

    // Localize elements that carry data-en / data-de attributes
    // (main-page link, swap button, alignment toggle labels, explanation).
    var els = document.querySelectorAll('[data-' + currentLang + ']');
    for (var i = 0; i < els.length; i++) {
      els[i].textContent = els[i].getAttribute('data-' + currentLang);
    }

    // Fit stage height — then refresh cached rects, since the new layout
    // moves layer-hidden / sub-hidden positions.
    requestAnimationFrame(function () {
      fitStage();
      refreshRects();
    });
  }

  function fitStage() {
    var h = Math.max(layerSurface.scrollHeight, layerHidden.scrollHeight);
    stage.style.minHeight = h + 'px';
  }
  window.addEventListener('resize', fitStage);

  // ── Language switching ──
  window.switchLang = function (lang) {
    currentLang = lang;
    render();
  };

  // ── Swap layers ──
  window.swapLayers = function () {
    surfaceVoice = surfaceVoice === 'odysseus' ? 'siren' : 'odysseus';
    render();
  };

  // ── Alignment mode switching ──
  // horizontal = equal-width columns (both voices span the full stage)
  // vertical   = asymmetric: Odysseus narrower, Siren wider, both centered,
  //              so Siren extends past Odysseus on both sides
  //              (only renders on viewports >= 801px; toggle is hidden below)
  window.switchAlign = function (mode) {
    document.body.classList.toggle('layout-vertical',   mode === 'vertical');
    document.body.classList.toggle('layout-horizontal', mode === 'horizontal');
    document.getElementById('btnAlignH').className =
      (mode === 'horizontal') ? 'active' : '';
    document.getElementById('btnAlignV').className =
      (mode === 'vertical') ? 'active' : '';
    // Layout change affects layer heights → refit stage, then refresh
    // the cached rects since alignment switching moves layer-hidden.
    requestAnimationFrame(function () {
      fitStage();
      refreshRects();
    });
  };

  // ── Reveal mask ──
  //
  // Performance notes (matters most on mobile):
  //
  // 1. rAF batching. touchmove can fire at the display refresh rate (60 Hz
  //    on most phones, 120 Hz on iPhone Pro / iPad Pro). Without batching,
  //    each event triggered three mask-repaints (text + subtitle + wash)
  //    × two property writes each (mask-image + -webkit-mask-image) plus
  //    a forced layout via getBoundingClientRect — easily 5-10 ms per
  //    event on mid-range Android, well above frame budget. We collect
  //    the latest pointer position into queuedX/Y and let one rAF callback
  //    apply the actual DOM writes — natural coalescing at display rate.
  //
  // 2. Cached bounding rects. The two text columns don't move during
  //    pointer interaction, so we measure them once and refresh on layout
  //    events only (resize, scroll, render, alignment switch). Saves two
  //    forced-layout reads per paint.
  //
  // 3. Mask pre-warm. WebKit allocates the GPU mask buffer lazily on the
  //    first non-trivial gradient. For a viewport-tall text layer that
  //    one-off allocation runs ~100-200 ms on mobile, and reads as "the
  //    cone takes forever to appear on first touch". Pre-warming with an
  //    off-screen mask on init pushes that cost out of the interaction
  //    path.

  // Cached layout rects — refreshed only when geometry actually changes.
  var hiddenRect = null;
  var subHiddenRect = null;
  function refreshRects() {
    hiddenRect = layerHidden.getBoundingClientRect();
    subHiddenRect = subHidden.getBoundingClientRect();
  }

  // rAF queue — the latest pointer position waits here until the next
  // animation frame. queuedX/Y are also used by the ring-position write so
  // ring + mask stay in lockstep (no half-frame between them).
  var queuedX = -9999;
  var queuedY = -9999;
  var paintQueued = false;

  function queuePaint() {
    if (paintQueued) return;
    paintQueued = true;
    requestAnimationFrame(paintFrame);
  }

  function paintFrame() {
    paintQueued = false;
    cursorRing.style.left = queuedX + 'px';
    cursorRing.style.top  = queuedY + 'px';
    if (!hiddenRect) refreshRects();
    writeMasks(queuedX, queuedY);
  }

  function writeMasks(clientX, clientY) {
    var inner = REVEAL_RADIUS - REVEAL_EDGE;

    // Text-column reveal — coords are layer-relative because layer-hidden
    // is position:absolute inside the stage.
    var rx = clientX - hiddenRect.left;
    var ry = clientY - hiddenRect.top;
    var maskValue = 'radial-gradient(circle ' + REVEAL_RADIUS + 'px at ' +
      rx + 'px ' + ry + 'px, black 0%, black ' + inner +
      'px, transparent ' + REVEAL_RADIUS + 'px)';
    layerHidden.style.webkitMaskImage = maskValue;
    layerHidden.style.maskImage = maskValue;

    // Subtitle reveal — same shape, different element offsets.
    var subRx = clientX - subHiddenRect.left;
    var subRy = clientY - subHiddenRect.top;
    var subMask = 'radial-gradient(circle ' + REVEAL_RADIUS + 'px at ' +
      subRx + 'px ' + subRy + 'px, black 0%, black ' + inner +
      'px, transparent ' + REVEAL_RADIUS + 'px)';
    subHidden.style.webkitMaskImage = subMask;
    subHidden.style.maskImage = subMask;

    // Wash mask — in viewport coords because .reveal-wash is position:fixed.
    // Continuous fade (no solid inner) so it reads as a soft cone, not a
    // disc; the text-layer masks keep the solid inner so text stays sharp.
    var washMask = 'radial-gradient(circle ' + REVEAL_RADIUS + 'px at ' +
      clientX + 'px ' + clientY + 'px, black 0%, transparent 100%)';
    revealWash.style.webkitMaskImage = washMask;
    revealWash.style.maskImage = washMask;
  }

  // Pre-warm — issue a full-radius mask at an off-screen position so the
  // GPU buffer is allocated and the gradient parsed before the first user
  // touch. Without this, the very first reveal stalls visibly on mobile.
  function prewarmMasks() {
    var inner = REVEAL_RADIUS - REVEAL_EDGE;
    var preMask = 'radial-gradient(circle ' + REVEAL_RADIUS +
      'px at -9999px -9999px, black 0%, black ' + inner +
      'px, transparent ' + REVEAL_RADIUS + 'px)';
    layerHidden.style.webkitMaskImage = preMask;
    layerHidden.style.maskImage = preMask;
    subHidden.style.webkitMaskImage = preMask;
    subHidden.style.maskImage = preMask;
    var preWash = 'radial-gradient(circle ' + REVEAL_RADIUS +
      'px at -9999px -9999px, black 0%, transparent 100%)';
    revealWash.style.webkitMaskImage = preWash;
    revealWash.style.maskImage = preWash;
  }

  // Geometry-change refresh — anything that can move the text columns
  // invalidates the cached rects.
  window.addEventListener('resize', refreshRects);
  window.addEventListener('scroll', refreshRects, { passive: true });

  // ── Desktop: mouse ──
  document.addEventListener('mousemove', function (e) {
    fadeHint();
    queuedX = e.clientX;
    queuedY = e.clientY;
    queuePaint();
  });

  // ── Mobile: touch ──
  // Flag set while a scroll arrow is held — reveal handlers then bail,
  // so the ring doesn't chase the button and the mask doesn't update
  // from the button-press coordinates.
  var scrollingViaArrow = false;

  if (isMobile) {
    // On small+medium viewports (mobile and tablet) the ring sits above
    // the finger — bottom edge of circle at the touch point — so the
    // reveal isn't covered by the hand. Offset = half the ring's rendered
    // height, read from the live element so it stays in sync with the CSS.
    var ringOffsetY = 0;
    function recalcRingOffset() {
      // Shift the ring up on touch viewports so the bottom edge sits
      // on the fingertip. Gated on pointer:coarse (matches the CSS
      // media query) so it doesn't misfire on a narrow desktop
      // window where FIGROUND.isMobile might still be true
      // (e.g. touch-capable laptop used with a mouse).
      ringOffsetY = window.matchMedia('(max-width: 1200px) and (pointer: coarse)').matches
        ? cursorRing.offsetHeight / 2
        : 0;
    }
    recalcRingOffset();
    window.addEventListener('resize', recalcRingOffset);
    window.addEventListener('orientationchange', recalcRingOffset);

    function onTouch(e) {
      if (scrollingViaArrow) return;
      fadeHint();
      queuedX = e.touches[0].clientX;
      queuedY = e.touches[0].clientY - ringOffsetY;
      // touch-active is idempotent (classList.add is a no-op if present)
      // and visual-only; safe to write straight from the event.
      cursorRing.classList.add('touch-active');
      queuePaint();
    }

    document.addEventListener('touchstart', onTouch, { passive: true });
    document.addEventListener('touchmove', onTouch, { passive: true });

    document.addEventListener('touchend', function () {
      // Ring fades out, but the reveal mask stays put — the last
      // revealed patch of text remains readable (at lower contrast,
      // since the puddle is gone). Next touch overwrites the mask.
      cursorRing.classList.remove('touch-active');
    }, { passive: true });
  }

  // ── Scroll arrows ──
  // Hold-to-scroll at a constant rate. Buttons are hidden via CSS on
  // desktop (>1200px), so this code only takes effect on touch viewports.
  var scrollUp   = document.getElementById('scrollUp');
  var scrollDown = document.getElementById('scrollDown');
  var SCROLL_SPEED = 8; // px per animation frame (~480 px/s at 60fps)
  var scrollRafId = null;

  function scrollLoop(direction) {
    window.scrollBy(0, direction * SCROLL_SPEED);
    scrollRafId = requestAnimationFrame(function () { scrollLoop(direction); });
  }

  function startScroll(direction) {
    fadeHint();
    scrollingViaArrow = true;
    // Hide the reveal ring while scrolling so it doesn't appear to jump.
    cursorRing.classList.remove('touch-active');
    if (scrollRafId !== null) cancelAnimationFrame(scrollRafId);
    scrollLoop(direction);
  }

  function stopScroll() {
    if (scrollRafId !== null) {
      cancelAnimationFrame(scrollRafId);
      scrollRafId = null;
    }
    scrollingViaArrow = false;
  }

  function bindScrollButton(btn, direction) {
    // Touch: hold to scroll.
    btn.addEventListener('touchstart', function (e) {
      e.stopPropagation();
      e.preventDefault(); // don't fall through to the reveal listener
      startScroll(direction);
    }, { passive: false });

    ['touchend', 'touchcancel'].forEach(function (ev) {
      btn.addEventListener(ev, function (e) {
        e.stopPropagation();
        stopScroll();
      });
    });

    // Mouse fallback (for desktop testing in DevTools device emulation).
    btn.addEventListener('mousedown', function (e) {
      e.stopPropagation();
      e.preventDefault();
      startScroll(direction);
    });
    ['mouseup', 'mouseleave'].forEach(function (ev) {
      btn.addEventListener(ev, stopScroll);
    });
  }

  bindScrollButton(scrollUp,   -1);
  bindScrollButton(scrollDown, +1);

  function updateArrowVisibility() {
    var y = window.scrollY || window.pageYOffset || 0;
    var max = (document.documentElement.scrollHeight || document.body.scrollHeight) - window.innerHeight;

    // Up: visible once we've scrolled a bit away from the top.
    if (y > 40) scrollUp.classList.add('visible');
    else        scrollUp.classList.remove('visible');

    // Down: visible while there's meaningful content below the fold.
    if (max > 60 && y < max - 20) scrollDown.classList.add('visible');
    else                          scrollDown.classList.remove('visible');
  }

  window.addEventListener('scroll', updateArrowVisibility, { passive: true });
  window.addEventListener('resize', updateArrowVisibility);
  // Initial check after render + fitStage settle.
  requestAnimationFrame(function () {
    requestAnimationFrame(updateArrowVisibility);
  });

  // ── Init ──
  render();
  switchAlign('horizontal');
  // Pre-warm the mask buffers and seed the rect cache once layout settles,
  // so the very first finger-down doesn't have to wait for either.
  requestAnimationFrame(function () {
    refreshRects();
    prewarmMasks();
  });
});
</script>

</body>
</html>
