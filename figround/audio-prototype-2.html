<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure and Ground — Audio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cormorant Garamond', 'Georgia', serif;
    background: linear-gradient(to right,
      #f4f4f4 0%,
      #e4eaf0 12%,
      #98a8b8 38%,
      #3a4d66 68%,
      #0f1926 100%
    );
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4vh 4vw;
    overflow-x: hidden;
    overflow-y: auto;
  }

  /* Scroll hint — visible only when page overflows */
  .scroll-hint {
    position: fixed;
    bottom: 1em;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    text-shadow: 0 0 8px rgba(0,0,0,0.6);
    font-size: 0.8rem;
    font-style: italic;
    opacity: 0.8;
    transition: opacity 0.5s ease;
    pointer-events: none;
  }

  .scroll-hint span {
    display: inline-block;
    animation: bounce 1.5s ease infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(4px); }
  }

  /* ── TITLE ── */
  .main-title {
    display: flex;
    justify-content: center;
    align-items: baseline;
    gap: 0.4em;
    font-size: clamp(1.6rem, 3vw, 2.8rem);
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 1em;
  }

  .word-left {
    color: #000;
    text-shadow: 0 0 12px rgba(255,255,255,0.8);
  }
  .word-mid {
    color: #888;
    font-size: 0.7em;
    letter-spacing: 0.2em;
    font-weight: 400;
  }
  .word-right {
    color: #fff;
    text-shadow: 0 0 12px rgba(0,0,0,0.8);
  }

  /* ── AUDIO PLAYER AREA ── */
  .audio-stage {
    width: 100%;
    max-width: 900px;
    position: relative;
  }

  /* Speaker labels */
  .speaker-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 0 1em;
    margin-bottom: 1.5em;
  }

  .speaker-left {
    font-size: clamp(1rem, 1.4vw, 1.35rem);
    font-weight: 600;
    font-style: italic;
    letter-spacing: 0.08em;
    color: #000;
    text-shadow: 0 0 12px rgba(255,255,255,1), 0 0 24px rgba(255,255,255,0.5);
  }

  .speaker-right {
    font-size: clamp(1rem, 1.4vw, 1.35rem);
    font-weight: 600;
    font-style: italic;
    letter-spacing: 0.08em;
    color: #fff;
    text-shadow: 0 0 12px rgba(0,0,0,1), 0 0 24px rgba(0,0,0,0.5);
  }

  /* ── CROSSFADE SLIDER ── */
  .slider-container {
    position: relative;
    width: 100%;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 2em;
  }

  .slider-track-bg {
    position: absolute;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(to right,
      rgba(0,0,0,0.6) 0%,
      rgba(120,140,160,0.4) 50%,
      rgba(255,255,255,0.6) 100%
    );
  }

  input[type="range"]#crossfade {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    background: transparent;
    position: relative;
    z-index: 2;
    cursor: pointer;
  }

  input[type="range"]#crossfade::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, #c8d0d8, #5a6a7a);
    border: 2px solid rgba(255,255,255,0.4);
    box-shadow: 0 0 12px rgba(0,0,0,0.4), 0 0 24px rgba(0,0,0,0.15);
    cursor: grab;
    transition: transform 0.15s ease;
  }

  input[type="range"]#crossfade::-webkit-slider-thumb:active {
    cursor: grabbing;
    transform: scale(1.15);
  }

  input[type="range"]#crossfade::-moz-range-thumb {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, #c8d0d8, #5a6a7a);
    border: 2px solid rgba(255,255,255,0.4);
    box-shadow: 0 0 12px rgba(0,0,0,0.4);
    cursor: grab;
  }

  /* Volume indicators */
  .volume-indicators {
    display: flex;
    justify-content: space-between;
    padding: 0 0.5em;
    margin-top: -0.5em;
    margin-bottom: 2em;
  }

  .vol-label {
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 0.05em;
    opacity: 0.7;
    transition: opacity 0.3s ease;
  }

  .vol-left {
    color: #000;
    text-shadow: 0 0 8px rgba(255,255,255,0.6);
  }

  .vol-right {
    color: #fff;
    text-shadow: 0 0 8px rgba(0,0,0,0.6);
  }

  /* ── TRANSPORT CONTROLS ── */
  .transport {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.5em;
    margin-bottom: 1.5em;
  }

  .btn {
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 1.1rem;
    letter-spacing: 0.08em;
    padding: 0.5em 1.2em;
    border-radius: 4px;
    transition: all 0.2s ease;
  }

  .btn-play {
    color: #1a2a3a;
    background: rgba(255,255,255,0.25);
    border: 1px solid rgba(0,0,0,0.15);
    backdrop-filter: blur(4px);
    font-size: 1.3rem;
    padding: 0.6em 2em;
  }

  .btn-play:hover {
    background: rgba(255,255,255,0.4);
  }

  .btn-lang {
    color: #3a4d66;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(100,120,140,0.2);
    font-size: 0.95rem;
  }

  .btn-lang:hover {
    background: rgba(255,255,255,0.22);
  }

  .btn-lang.active {
    background: rgba(255,255,255,0.35);
    border-color: rgba(0,0,0,0.2);
    color: #0f1926;
  }

  .play-group {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 0.3em;
  }

  .play-group .btn-play {
    width: 100%;
  }

  .transport-secondary {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.3em;
  }

  .btn-transport {
    color: #1a2a3a;
    background: rgba(255,255,255,0.25);
    border: 1px solid rgba(0,0,0,0.15);
    backdrop-filter: blur(4px);
    cursor: pointer;
    font-family: inherit;
    font-size: 1rem;
    padding: 0.45em 0;
    border-radius: 4px;
    transition: all 0.2s ease;
    letter-spacing: 0.08em;
    line-height: 1;
    text-align: center;
  }

  .btn-transport:hover {
    background: rgba(255,255,255,0.4);
  }

  /* ── PROGRESS ── */
  .progress-container {
    width: 100%;
    margin-bottom: 0.8em;
    position: relative;
  }

  .progress-bar-bg {
    position: relative;
    width: 100%;
    height: 3px;
    background: rgba(120,140,160,0.25);
    border-radius: 2px;
    overflow: visible;
    cursor: pointer;
  }

  .progress-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(to right, rgba(0,0,0,0.5), rgba(255,255,255,0.5));
    border-radius: 2px;
    transition: width 0.1s linear;
  }

  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    letter-spacing: 0.04em;
    padding: 0.3em 0.2em 0;
  }

  #timeCurrent {
    color: #4a5a6a;
  }

  #timeDuration {
    color: rgba(255,255,255,0.75);
  }

  /* ── STROPHE MARKERS (inside progress bar) ── */
  .strophe-marker {
    position: absolute;
    width: 1.5px;
    top: -3px;
    height: 9px;
    cursor: pointer;
    transition: opacity 0.2s;
    opacity: 0.7;
    z-index: 2;
  }

  .strophe-marker:hover {
    opacity: 1;
  }

  .strophe-marker::after {
    content: '';
    position: absolute;
    left: -4px;
    right: -4px;
    top: 0;
    bottom: 0;
  }

  .strophe-marker-ody {
    background: #1a2a4a;
  }

  .strophe-marker-sir {
    background: #fff;
  }

  /* ── STATUS / LOADING ── */
  .status {
    text-align: center;
    font-size: 0.95rem;
    color: #fff;
    text-shadow: 0 0 6px rgba(0,0,0,0.5);
    font-style: italic;
    min-height: 1.5em;
    margin-bottom: 1em;
  }

  .loading-bar {
    width: 100%;
    height: 2px;
    background: rgba(120,140,160,0.15);
    border-radius: 1px;
    overflow: hidden;
    margin-bottom: 1em;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .loading-bar.visible {
    opacity: 1;
  }

  .loading-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(to right, rgba(0,0,0,0.3), rgba(255,255,255,0.4));
    transition: width 0.3s;
  }

  /* ── HINT ── */
  .hint {
    text-align: center;
    font-size: 0.8rem;
    color: #fff;
    text-shadow: 0 0 6px rgba(0,0,0,0.5);
    font-style: italic;
    opacity: 0.85;
  }

  /* ── TEXT TICKER ── */
  .ticker-row {
    width: 100%;
    max-width: 900px;
    margin-top: 1em;
    display: flex;
    align-items: center;
    gap: 0.6em;
  }

  .ticker {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    position: relative;
    height: 2.4em;
    padding: 0 0.6em;
    border-radius: 3px;
  }

  /* ── PERSPECTIVE TOGGLE ── */
  .perspective-toggle {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid rgba(120,140,160,0.4);
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.35s ease;
    box-shadow: 0 0 8px rgba(0,0,0,0.15);
  }

  .perspective-toggle.mode-odysseus {
    background: radial-gradient(circle at 40% 40%, #f4f4f4, #c8d0d8);
    border-color: rgba(200,210,220,0.6);
  }

  .perspective-toggle.mode-siren {
    background: radial-gradient(circle at 40% 40%, #3a4d66, #0f1926);
    border-color: rgba(15,25,38,0.6);
  }

  .ticker-odysseus {
    background: linear-gradient(to right,
      rgba(244,244,244,0.5) 0%,
      rgba(228,234,240,0.4) 50%,
      rgba(152,168,184,0.2) 100%
    );
  }

  .ticker-siren {
    background: linear-gradient(to right,
      rgba(58,77,102,0.2) 0%,
      rgba(58,77,102,0.4) 50%,
      rgba(15,25,38,0.5) 100%
    );
  }

  .ticker-text {
    position: absolute;
    top: 50%;
    white-space: nowrap;
    font-size: clamp(0.85rem, 1.1vw, 1.05rem);
    line-height: 1.4;
    letter-spacing: 0.02em;
    transform-origin: 0% 50%;
  }

  .ticker-text-odysseus {
    color: #000;
    font-weight: 500;
    text-shadow: 0 0 8px rgba(255,255,255,0.9), 0 0 16px rgba(255,255,255,0.5);
  }

  .ticker-text-siren {
    color: #fff;
    font-weight: 400;
    text-shadow: 0 0 8px rgba(0,0,0,0.9), 0 0 16px rgba(0,0,0,0.5);
  }

  .ticker-text .song {
    font-style: italic;
  }

  /* Fade edges of ticker */
  .ticker-odysseus::before,
  .ticker-odysseus::after,
  .ticker-siren::before,
  .ticker-siren::after {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    width: 60px;
    z-index: 2;
    pointer-events: none;
  }

  .ticker-odysseus::before {
    left: 0;
    background: linear-gradient(to right, rgba(244,244,244,0.8), transparent);
  }
  .ticker-odysseus::after {
    right: 0;
    background: linear-gradient(to left, rgba(180,196,210,0.6), transparent);
  }
  .ticker-siren::before {
    left: 0;
    background: linear-gradient(to right, rgba(58,77,102,0.6), transparent);
  }
  .ticker-siren::after {
    right: 0;
    background: linear-gradient(to left, rgba(15,25,38,0.8), transparent);
  }

  /* ── BACK LINK ── */
  .back-link {
    margin-top: 3em;
    text-align: center;
  }

  .back-link a {
    color: #3a4d66;
    text-decoration: none;
    font-size: 0.95rem;
    border-bottom: 1px solid rgba(58,77,102,0.3);
    transition: border-color 0.2s;
  }

  .back-link a:hover {
    border-color: rgba(58,77,102,0.7);
  }
</style>
</head>
<body>

<div class="main-title">
  <span class="word-left">Figure</span>
  <span class="word-mid">and</span>
  <span class="word-right">Ground</span>
</div>

<div class="audio-stage">

  <div class="speaker-row">
    <span class="speaker-left">Odysseus</span>
    <span class="speaker-right">The Siren</span>
  </div>

  <!-- Crossfade slider -->
  <div class="slider-container">
    <div class="slider-track-bg"></div>
    <input type="range" id="crossfade" min="0" max="100" value="50" step="1">
  </div>

  <div class="volume-indicators">
    <span class="vol-label vol-left" id="volLeft">100 %</span>
    <span class="hint">Move the slider to shift between perspectives. Headphones recommended.</span>
    <span class="vol-label vol-right" id="volRight">100 %</span>
  </div>

  <!-- Transport -->
  <div class="transport">
    <button class="btn btn-lang active" id="btnDe" onclick="switchLang('de')">Deutsch</button>
    <div class="play-group">
      <button class="btn btn-play" id="btnPlay" onclick="togglePlay()" disabled>▶ Play</button>
      <div class="transport-secondary">
        <button class="btn-transport" onclick="jumpPrev()" title="Vorherige Strophe">◀◀</button>
        <button class="btn-transport" onclick="stopPlayback()" title="Stop">■</button>
        <button class="btn-transport" onclick="jumpNext()" title="Nächste Strophe">▶▶</button>
      </div>
    </div>
    <button class="btn btn-lang" id="btnEn" onclick="switchLang('en')">English</button>
  </div>

  <!-- Loading -->
  <div class="loading-bar" id="loadingBar">
    <div class="loading-bar-fill" id="loadingFill"></div>
  </div>
  <div class="status" id="status">Loading audio files …</div>

  <!-- Progress -->
  <div class="progress-container">
    <div class="progress-bar-bg" id="progressBg" onclick="seek(event)">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="time-row">
      <span id="timeCurrent">0:00</span>
      <span id="timeDuration">—</span>
    </div>
  </div>

</div>

<!-- Text tickers with perspective toggle -->
<div class="ticker-row">
  <div class="ticker ticker-odysseus" id="tickerOdy">
    <div class="ticker-text ticker-text-odysseus" id="tickerTextOdy"></div>
  </div>
  <button class="perspective-toggle mode-odysseus" id="perspToggle" onclick="togglePerspective()" title="Perspektive wechseln"></button>
  <div class="ticker ticker-siren" id="tickerSir">
    <div class="ticker-text ticker-text-siren" id="tickerTextSir"></div>
  </div>
</div>

<div class="back-link">
  <a href="index.html">← Overview</a>
</div>

<div class="scroll-hint" id="scrollHint"><span>&#x25BE;</span> scroll <span>&#x25BE;</span></div>

<script>
// ── Scroll hint: show only when content overflows ──
(function() {
  const hint = document.getElementById('scrollHint');
  function checkOverflow() {
    hint.style.display = document.body.scrollHeight > window.innerHeight ? '' : 'none';
  }
  checkOverflow();
  window.addEventListener('resize', checkOverflow);
  window.addEventListener('scroll', function() {
    if (window.scrollY > 30) {
      hint.style.opacity = '0';
      setTimeout(() => hint.style.display = 'none', 500);
    }
  });
})();

// ── Audio Engine ──

const AUDIO_FILES = {
  de: { odysseus: 'audio/Odysseus_de/odysseus_de_indexed.mp3', siren: 'audio/Siren_de/siren_de_indexed.mp3' },
  en: { odysseus: 'audio/Odysseus_en/odysseus_en_indexed.mp3', siren: 'audio/Siren_en/siren_en_indexed.mp3' },
};

let audioCtx = null;
let buffers = { de: {}, en: {} };
let sources = { odysseus: null, siren: null };
let gains = { odysseus: null, siren: null };
let panners = { odysseus: null, siren: null };

let currentLang = 'de';
let isPlaying = false;
let startTime = 0;      // audioCtx.currentTime when playback started
let pauseOffset = 0;    // how far into the track we paused
let loadedCount = 0;
const totalFiles = 4;

// Stereo panning range: how far left/right the voices sit
// -1 = hard left, +1 = hard right
const PAN_ODYSSEUS_BASE = -0.35;  // Odysseus slightly left
const PAN_SIREN_BASE = 0.35;     // Siren slightly right

// ── Init ──

async function init() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Create panner nodes (stereo positioning)
  panners.odysseus = audioCtx.createStereoPanner();
  panners.siren = audioCtx.createStereoPanner();
  panners.odysseus.pan.setValueAtTime(PAN_ODYSSEUS_BASE, audioCtx.currentTime);
  panners.siren.pan.setValueAtTime(PAN_SIREN_BASE, audioCtx.currentTime);

  // Create gain nodes
  gains.odysseus = audioCtx.createGain();
  gains.siren = audioCtx.createGain();

  // Signal chain: source → gain → panner → destination
  gains.odysseus.connect(panners.odysseus);
  gains.siren.connect(panners.siren);
  panners.odysseus.connect(audioCtx.destination);
  panners.siren.connect(audioCtx.destination);

  // Apply initial crossfade (50/50)
  updateCrossfade(50);

  // Load all audio files
  const loadingBar = document.getElementById('loadingBar');
  const loadingFill = document.getElementById('loadingFill');
  loadingBar.classList.add('visible');

  const loadPromises = [];

  for (const lang of ['de', 'en']) {
    for (const role of ['odysseus', 'siren']) {
      const url = AUDIO_FILES[lang][role];
      loadPromises.push(
        fetch(url)
          .then(r => {
            if (!r.ok) throw new Error(`Failed to load ${url}`);
            return r.arrayBuffer();
          })
          .then(buf => audioCtx.decodeAudioData(buf))
          .then(decoded => {
            buffers[lang][role] = decoded;
            loadedCount++;
            loadingFill.style.width = (loadedCount / totalFiles * 100) + '%';
            document.getElementById('status').textContent =
              `Loaded: ${loadedCount} / ${totalFiles} …`;
          })
      );
    }
  }

  try {
    await Promise.all(loadPromises);
    loadingBar.classList.remove('visible');
    document.getElementById('status').textContent = '';
    document.getElementById('btnPlay').disabled = false;
    updateDuration();
    renderStropheMarkers();
  } catch (e) {
    document.getElementById('status').textContent =
      'Error loading audio. Please make sure the MP3 files are in the audio/ folder.';
    console.error(e);
  }
}

// ── Crossfade ──

function updateCrossfade(value) {
  // value: 0 = full Odysseus, 100 = full Siren
  // Use equal-power crossfade
  const x = value / 100;
  const gainOdy = Math.cos(x * Math.PI / 2);
  const gainSir = Math.sin(x * Math.PI / 2);

  if (gains.odysseus) gains.odysseus.gain.setValueAtTime(gainOdy, audioCtx.currentTime);
  if (gains.siren) gains.siren.gain.setValueAtTime(gainSir, audioCtx.currentTime);

  // Dynamic stereo panning:
  // At center (x=0.5): voices sit at their base positions (L/R)
  // Focus Odysseus (x→0): Odysseus moves toward center, Siren pushed further right
  // Focus Siren (x→1): Siren moves toward center, Odysseus pushed further left
  if (panners.odysseus && panners.siren) {
    const panOdy = PAN_ODYSSEUS_BASE * (1 + x * 0.6);   // more left as siren focused
    const panSir = PAN_SIREN_BASE * (1 + (1 - x) * 0.6); // more right as odysseus focused
    panners.odysseus.pan.setValueAtTime(Math.max(-1, panOdy), audioCtx.currentTime);
    panners.siren.pan.setValueAtTime(Math.min(1, panSir), audioCtx.currentTime);
  }

  // Update labels
  document.getElementById('volLeft').textContent = Math.round(gainOdy * 100) + ' %';
  document.getElementById('volRight').textContent = Math.round(gainSir * 100) + ' %';

  // Update label opacity
  document.getElementById('volLeft').style.opacity = 0.4 + gainOdy * 0.6;
  document.getElementById('volRight').style.opacity = 0.4 + gainSir * 0.6;
}

document.getElementById('crossfade').addEventListener('input', function() {
  updateCrossfade(parseInt(this.value));
});

// ── Playback ──

function startPlayback(offset) {
  // Create new source nodes (they're one-shot)
  sources.odysseus = audioCtx.createBufferSource();
  sources.siren = audioCtx.createBufferSource();
  sources.odysseus.buffer = buffers[currentLang].odysseus;
  sources.siren.buffer = buffers[currentLang].siren;
  sources.odysseus.connect(gains.odysseus);
  sources.siren.connect(gains.siren);

  // When the longer track ends, stop everything
  const durOdy = buffers[currentLang].odysseus.duration;
  const durSir = buffers[currentLang].siren.duration;
  const maxDur = Math.max(durOdy, durSir);

  sources.odysseus.onended = () => {
    if (isPlaying && getCurrentTime() >= maxDur - 0.1) {
      stopPlayback();
    }
  };
  sources.siren.onended = () => {
    if (isPlaying && getCurrentTime() >= maxDur - 0.1) {
      stopPlayback();
    }
  };

  sources.odysseus.start(0, offset);
  sources.siren.start(0, offset);
  startTime = audioCtx.currentTime - offset;
  isPlaying = true;
}

function stopSources() {
  try { sources.odysseus?.stop(); } catch(e) {}
  try { sources.siren?.stop(); } catch(e) {}
  sources.odysseus = null;
  sources.siren = null;
}

function stopPlayback() {
  pauseOffset = 0;
  isPlaying = false;
  stopSources();
  updatePlayButton();
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('timeCurrent').textContent = '0:00';
}

function togglePlay() {
  if (audioCtx.state === 'suspended') audioCtx.resume();

  if (isPlaying) {
    pauseOffset = getCurrentTime();
    isPlaying = false;
    stopSources();
  } else {
    startPlayback(pauseOffset);
  }
  updatePlayButton();
}

function updatePlayButton() {
  const btn = document.getElementById('btnPlay');
  btn.textContent = isPlaying ? '❚❚ Pause' : '▶ Play';
}

function getCurrentTime() {
  if (!isPlaying) return pauseOffset;
  return audioCtx.currentTime - startTime;
}

function getMaxDuration() {
  if (!buffers[currentLang].odysseus || !buffers[currentLang].siren) return 0;
  return Math.max(
    buffers[currentLang].odysseus.duration,
    buffers[currentLang].siren.duration
  );
}

function updateDuration() {
  const dur = getMaxDuration();
  document.getElementById('timeDuration').textContent = formatTime(dur);
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

// ── Progress update loop ──

function updateProgress() {
  const cur = getCurrentTime();
  const dur = getMaxDuration();
  const pct = dur > 0 ? Math.min(cur / dur, 1) : 0;

  if (isPlaying) {
    document.getElementById('progressFill').style.width = (pct * 100) + '%';
    document.getElementById('timeCurrent').textContent = formatTime(cur);
  }

  // Always update tickers (also when paused, for seek)
  updateTickers(cur);

  requestAnimationFrame(updateProgress);
}

requestAnimationFrame(updateProgress);

// ── Seek ──

function seek(e) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const rect = document.getElementById('progressBg').getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const dur = getMaxDuration();
  const target = Math.max(0, Math.min(x * dur, dur));

  if (isPlaying) {
    stopSources();
    startPlayback(target);
  } else {
    pauseOffset = target;
    document.getElementById('timeCurrent').textContent = formatTime(target);
    document.getElementById('progressFill').style.width = (target / dur * 100) + '%';
  }
}

// ── Language switch ──

function switchLang(lang) {
  if (lang === currentLang) return;

  const wasPlaying = isPlaying;
  const offset = getCurrentTime();

  if (isPlaying) {
    stopSources();
    isPlaying = false;
  }

  currentLang = lang;
  pauseOffset = 0; // reset to start when switching language

  document.getElementById('btnDe').classList.toggle('active', lang === 'de');
  document.getElementById('btnEn').classList.toggle('active', lang === 'en');

  // Reset play button text
  document.getElementById('btnPlay').textContent = '▶ Play';

  updateDuration();
  document.getElementById('timeCurrent').textContent = '0:00';
  document.getElementById('progressFill').style.width = '0%';
  renderStropheMarkers();
  initTickers();
  updateTickers(0);

  if (wasPlaying) {
    startPlayback(0);
    updatePlayButton();
  }
}

// ── Strophe Markers on Timeline ──

function renderStropheMarkers() {
  var bar = document.getElementById('progressBg');
  // Remove old markers
  var old = bar.querySelectorAll('.strophe-marker');
  for (var j = 0; j < old.length; j++) old[j].remove();

  var dur = getMaxDuration();
  if (dur === 0) return;

  var ts = TIMESTAMPS[currentLang];
  if (!ts) return;

  function addMarkers(voice, cssClass) {
    var entries = ts[voice];
    if (!entries) return;
    // Skip index 0 (title) — first strophe marker would be at 0% anyway
    for (var i = 1; i < entries.length; i++) {
      var pct = (entries[i].start / dur) * 100;
      var tick = document.createElement('div');
      tick.className = 'strophe-marker ' + cssClass;
      tick.style.left = pct + '%';
      tick.title = voice + ' ' + i + ' — ' + formatTime(entries[i].start);
      (function(startSec) {
        tick.addEventListener('click', function(e) {
          e.stopPropagation();
          seekTo(startSec);
        });
      })(entries[i].start);
      bar.appendChild(tick);
    }
  }

  addMarkers('odysseus', 'strophe-marker-ody');
  addMarkers('siren', 'strophe-marker-sir');
}

function seekTo(seconds) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  var dur = getMaxDuration();
  var target = Math.max(0, Math.min(seconds, dur));

  if (isPlaying) {
    stopSources();
    startPlayback(target);
  } else {
    pauseOffset = target;
    document.getElementById('timeCurrent').textContent = formatTime(target);
    document.getElementById('progressFill').style.width = (target / dur * 100) + '%';
  }
}

// Jump to the next (+1) or previous (-1) strophe boundary for a given voice
function jumpStrophe(voice, direction) {
  var ts = TIMESTAMPS[currentLang];
  if (!ts || !ts[voice]) return;
  var entries = ts[voice];
  var cur = getCurrentTime();

  if (direction > 0) {
    // Find the first strophe that starts after current time (with small tolerance)
    for (var i = 0; i < entries.length; i++) {
      if (entries[i].start > cur + 0.5) {
        seekTo(entries[i].start);
        return;
      }
    }
  } else {
    // Find the last strophe whose start is before current time (with tolerance)
    for (var i = entries.length - 1; i >= 0; i--) {
      if (entries[i].start < cur - 1.5) {
        seekTo(entries[i].start);
        return;
      }
    }
    seekTo(0);
  }
}

// Jump to next/previous strophe boundary (either voice, whichever comes first)
function jumpNext() {
  var ts = TIMESTAMPS[currentLang];
  if (!ts) return;
  var cur = getCurrentTime();
  var best = Infinity;

  for (var voice in ts) {
    var entries = ts[voice];
    for (var i = 0; i < entries.length; i++) {
      if (entries[i].start > cur + 0.5 && entries[i].start < best) {
        best = entries[i].start;
        break;
      }
    }
  }
  if (best < Infinity) seekTo(best);
}

function jumpPrev() {
  var ts = TIMESTAMPS[currentLang];
  if (!ts) return;
  var cur = getCurrentTime();
  var best = -1;

  for (var voice in ts) {
    var entries = ts[voice];
    for (var i = entries.length - 1; i >= 0; i--) {
      if (entries[i].start < cur - 1.5 && entries[i].start > best) {
        best = entries[i].start;
        break;
      }
    }
  }
  seekTo(best >= 0 ? best : 0);
}

      const stropheEls = el.querySelectorAll('.strophe');
      const ranges = [];
      stropheEls.forEach(s => {
        ranges.push({
          left: s.offsetLeft,
          width: s.offsetWidth,
          right: s.offsetLeft + s.offsetWidth,
        });
      });

      tickerData[voice] = {
        ranges: ranges,
        timestamps: ts[voice],
        totalWidth: el.scrollWidth,
      };
      console.log('[ticker]', voice, 'strophe-sync ON —', parts.length, 'parts,', ranges.length, 'ranges, totalWidth:', el.scrollWidth);
    } else {
      // No timestamps available — plain text, linear fallback
      el.innerHTML = fullText;
      tickerData[voice] = null;
      console.warn('[ticker]', voice, 'LINEAR FALLBACK — parts:', parts.length, 'timestamps:', ts && ts[voice] ? ts[voice].length : 'none');
    }
  }
}

function togglePerspective() {
  const btn = document.getElementById('perspToggle');
  if (perspectiveMode === 'odysseus') {
    perspectiveMode = 'siren';
    btn.classList.remove('mode-odysseus');
    btn.classList.add('mode-siren');
  } else {
    perspectiveMode = 'odysseus';
    btn.classList.remove('mode-siren');
    btn.classList.add('mode-odysseus');
  }
}

// Convert current playback time to a 0..1 scroll progress for one voice,
// taking strophe boundaries and pauses into account.
function getScrollProgress(voice, currentTime, duration) {
  const data = tickerData[voice];
  if (!data) {
    // Linear fallback (no timestamps for this language)
    return duration > 0 ? currentTime / duration : 0;
  }

  const { ranges, timestamps, totalWidth } = data;
  if (totalWidth === 0) return 0;

  // Before first strophe starts
  if (currentTime < timestamps[0].start) return 0;

  for (let i = 0; i < timestamps.length; i++) {
    const ts = timestamps[i];

    // Currently inside strophe i — interpolate within it
    if (currentTime >= ts.start && currentTime <= ts.end) {
      const t = (currentTime - ts.start) / (ts.end - ts.start);
      const pixelPos = ranges[i].left + t * ranges[i].width;
      return pixelPos / totalWidth;
    }

    // In a pause between strophe i and i+1 — hold at midpoint of separator
    // so the ◆ and the strophe ending stay visible
    if (i < timestamps.length - 1 && currentTime > ts.end && currentTime < timestamps[i + 1].start) {
      var pausePos = (ranges[i].right + ranges[i + 1].left) / 2;
      return pausePos / totalWidth;
    }
  }

  // After all strophes (trailing silence) — include trailing pad
  return Math.min(1, (ranges[ranges.length - 1].right + 60) / totalWidth);
}

function updateTickers(currentTime) {
  const duration = getMaxDuration();

  const odyEl = document.getElementById('tickerTextOdy');
  const sirEl = document.getElementById('tickerTextSir');
  const tickerOdyW = document.getElementById('tickerOdy').offsetWidth;
  const tickerSirW = document.getElementById('tickerSir').offsetWidth;
  const odyTextW = odyEl.scrollWidth;
  const sirTextW = sirEl.scrollWidth;

  const odyProgress = getScrollProgress('odysseus', currentTime, duration);
  const sirProgress = getScrollProgress('siren', currentTime, duration);

  // Gentle lead-in: at progress=0 the text starts ~35% into the ticker,
  // fading to normal scrolling by ~8% progress.
  function leadIn(progress, tickerW) {
    return Math.max(0, (1 - progress * 12)) * tickerW * 0.35;
  }

  if (perspectiveMode === 'odysseus') {
    // Odysseus: normal text, scrolls L→R
    const odyX = leadIn(odyProgress, tickerOdyW) - odyProgress * (odyTextW - tickerOdyW);
    odyEl.style.transform = 'translateY(-50%) translateX(' + odyX + 'px)';

    // Siren: mirrored text, scrolls R→L
    const sirX = tickerSirW - leadIn(sirProgress, tickerSirW) + sirProgress * (sirTextW - tickerSirW);
    sirEl.style.transform = 'translateY(-50%) translateX(' + sirX + 'px) scaleX(-1)';
  } else {
    // Siren: normal text, scrolls L→R
    const sirX = leadIn(sirProgress, tickerSirW) - sirProgress * (sirTextW - tickerSirW);
    sirEl.style.transform = 'translateY(-50%) translateX(' + sirX + 'px)';

    // Odysseus: mirrored text, scrolls R→L
    const odyX = tickerOdyW - leadIn(odyProgress, tickerOdyW) + odyProgress * (odyTextW - tickerOdyW);
    odyEl.style.transform = 'translateY(-50%) translateX(' + odyX + 'px) scaleX(-1)';
  }
}

initTickers();
updateTickers(0);

// ── Start ──

init();
</script>
