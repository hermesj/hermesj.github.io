<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure and Ground — Audio</title>
<meta name="description" content="Crossfade between two voices on the myth of Odysseus and the Siren. Headphones recommended.">
<meta property="og:title" content="Figure and Ground — Voices">
<meta property="og:description" content="Crossfade between two voices — Odysseus on the left, the Siren on the right. Headphones recommended.">
<meta property="og:image" content="https://hermesj.github.io/figround/images/tile-audio-en.jpg">
<meta property="og:url" content="https://hermesj.github.io/figround/audio.html">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="figround.css">
<link rel="stylesheet" href="audio-shared.css">
<style>
  /* audio.html-specific styling.
     Shared transport / play-button chrome, mobile base → audio-shared.css.
     Play button SVG icons + updatePlayButton()         → audio-shared.js.
     Header / footer / explanation                      → injected by
                                                          FIGROUND.injectHeader. */

  /* ── VOLUME LABEL COLORS (gradient-mirrored: they sit at the extremes) ── */
  .vol-left {
    color: #000;
    text-shadow: 0 0 8px rgba(255,255,255,0.6);
  }
  .vol-right {
    color: #fff;
    text-shadow: 0 0 8px rgba(0,0,0,0.6);
  }

  /* ── TRANSPORT LAYOUT — prev sits left of Play, next on the right.
     Lang buttons used to flank the play-group — they live in the shared
     header now, so the row centers the single play-group. */
  .play-group {
    display: flex;
    align-items: center;
    gap: 0.5em;
    flex: 1;
    max-width: 480px;
  }

  .btn-transport {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.55em 0.85em;
    border: 1px solid rgba(160,180,200,0.45);
    border-radius: 5px;
    background: rgba(80,100,125,0.65);
    color: #fff;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .btn-transport:hover {
    border-color: rgba(200,215,230,0.7);
    background: rgba(105,125,150,0.78);
  }
  .btn-transport:active {
    transform: scale(0.95);
  }
  .btn-transport svg {
    width: 1.05em;
    height: 1.05em;
    display: block;
  }

  /* ── PROGRESS BAR — strophe bars overflow the bar ── */
  .progress-container {
    width: 100%;
    margin-bottom: 1.5em;
  }
  .progress-bar-bg {
    position: relative;
    width: 100%;
    height: 3px;
    background: rgba(120,140,160,0.25);
    border-radius: 2px;
    overflow: visible;
    cursor: pointer;
  }
  #timeCurrent { color: #4a5a6a; }
  #timeDuration { color: rgba(255,255,255,0.75); }

  /* ── STROPHE BARS ── */
  .strophe-bars {
    position: relative;
    width: 100%;
    height: 14px;
  }
  .strophe-bars-ody { margin-bottom: 2px; }
  .strophe-bars-sir { margin-top: 2px; }
  .strophe-bar {
    position: absolute;
    height: 100%;
    border-radius: 2px;
    cursor: pointer;
    transition: opacity 0.2s;
    opacity: 0.6;
  }
  .strophe-bar:hover { opacity: 1; }
  .strophe-bar-ody {
    background: rgba(228,234,242,0.5);
    border: 1px solid rgba(20,30,50,0.4);
  }
  .strophe-bar-sir {
    background: rgba(15,25,38,0.38);
    border: 1px solid rgba(200,210,225,0.5);
  }
  .strophe-bar-active { opacity: 1; }
  .strophe-bar-ody.strophe-bar-active { background: rgba(244,248,252,0.75); }
  .strophe-bar-sir.strophe-bar-active { background: rgba(5,10,18,0.65); }

  /* ── PERSPECTIVE TOGGLE ── */
  .perspective-toggle {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid rgba(120,140,160,0.4);
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.35s ease;
    box-shadow: 0 0 8px rgba(0,0,0,0.15);
  }
  .perspective-toggle.mode-odysseus {
    background: radial-gradient(circle at 40% 40%, #f4f4f4, #c8d0d8);
    border-color: rgba(200,210,220,0.6);
  }
  .perspective-toggle.mode-siren {
    background: radial-gradient(circle at 40% 40%, #3a4d66, #0f1926);
    border-color: rgba(15,25,38,0.6);
  }

  /* Ticker text colors (audio-shared.css supplies only font-weight + glow). */
  .ticker-text-odysseus { color: #000; }
  .ticker-text-siren    { color: #fff; }

  /* ══════════════════════════════════════════════════════════════
     MOBILE — keep prev / Play / next on one row, Play stretches.
     ══════════════════════════════════════════════════════════════ */
  @media (max-width: 768px) {
    .play-group {
      width: 100%;
      max-width: none;
      gap: 0.4em;
    }
    .btn-play { flex: 1; }
    .btn-transport {
      padding: 0.75em 0.7em;
    }
  }
</style>
</head>
<body>

<main class="audio-content">

<div class="main-title">
  <span class="word-left" id="titleLeft">Figure</span>
  <span class="word-mid" id="titleMid">and</span>
  <span class="word-right" id="titleRight">Ground</span>
</div>

<div class="audio-stage">

  <div class="speaker-row">
    <span class="speaker-left color-ody-strong">Odysseus</span>
    <span class="speaker-right color-sir-strong">The Siren</span>
  </div>

  <!-- Crossfade slider -->
  <div class="slider-container">
    <div class="slider-track-bg"></div>
    <input type="range" id="crossfade" min="0" max="100" value="50" step="1">
  </div>

  <div class="volume-indicators">
    <span class="vol-label vol-left" id="volLeft">100 %</span>
    <span class="vol-label vol-right" id="volRight">100 %</span>
  </div>

  <!-- Transport — prev / Play / next on a single row. -->
  <div class="transport">
    <div class="play-group">
      <button class="btn-transport" onclick="jumpPrev()" title="Vorherige Strophe" aria-label="Previous">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"><line x1="5" y1="5" x2="5" y2="15"/><path d="M16 5 L7.5 10 L16 15 Z"/></svg>
      </button>
      <button class="btn btn-play" id="btnPlay" onclick="togglePlay()" disabled>
        <span class="btn-icon" id="btnPlayIcon" aria-hidden="true"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"><path d="M6 4.5 L16 10 L6 15.5 Z"/></svg></span>
        <span class="btn-label" id="btnPlayLabel">Play</span>
      </button>
      <button class="btn-transport" onclick="jumpNext()" title="Nächste Strophe" aria-label="Next">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"><path d="M4 5 L12.5 10 L4 15 Z"/><line x1="15" y1="5" x2="15" y2="15"/></svg>
      </button>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading-bar" id="loadingBar">
    <div class="loading-bar-fill" id="loadingFill"></div>
  </div>
  <div class="status" id="status">Loading audio files …</div>

  <!-- Progress with strophe bars -->
  <div class="progress-container">
    <div class="strophe-bars strophe-bars-ody" id="stropheBarsOdy"></div>
    <div class="progress-bar-bg" id="progressBg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="strophe-bars strophe-bars-sir" id="stropheBarsSir"></div>
    <div class="time-row">
      <span id="timeCurrent">0:00</span>
      <span id="timeDuration">—</span>
    </div>
  </div>

</div>

<!-- Text tickers with perspective toggle -->
<div class="ticker-row">
  <div class="ticker ticker-odysseus" id="tickerOdy">
    <div class="ticker-text ticker-text-odysseus" id="tickerTextOdy"></div>
  </div>
  <button class="perspective-toggle mode-odysseus" id="perspToggle" onclick="togglePerspective()" title="Perspektive wechseln"></button>
  <div class="ticker ticker-siren" id="tickerSir">
    <div class="ticker-text ticker-text-siren" id="tickerTextSir"></div>
  </div>
</div>

</main>

<div class="scroll-hint" id="scrollHint"><span>&#x25BE;</span> scroll <span>&#x25BE;</span></div>

<script src="figround.js"></script>
<script src="audio-timestamps.js"></script>
<script src="audio-shared.js"></script>
<script>
// Inject shared header / footer / explanation synchronously so the
// btnDe / btnEn IDs exist by the time switchLang runs in init().
FIGROUND.injectHeader({
  explanation: {
    en: 'Move the slider to shift between perspectives — Odysseus on the left, the Siren on the right. Headphones recommended. The strophe bars beside the timeline let you jump between sections.',
    de: 'Bewege den Regler, um zwischen den Perspektiven zu wechseln — Odysseus links, die Sirene rechts. Kopfhörer empfohlen. Die Strophenleisten neben der Zeitleiste erlauben den Sprung zwischen Abschnitten.'
  }
});

// ── Init ──
//
// Audio architecture: HTMLAudioElement + MediaElementAudioSourceNode.
// All four <audio> elements (lang × role) are created at startup with
// preload="metadata", so the browser fetches just the MP3 headers
// (~50 KB / file) — enough to know each track's duration. Actual
// streaming starts on first play(); the browser handles range requests
// and buffering. Each element is wrapped exactly once in a
// MediaElementAudioSourceNode (the API is single-shot per element) and
// stays permanently connected to its role's gain node — switching
// language is just pause + reset on the old pair, play on the new one,
// no fetch / decode involved.

async function init() {
  // Wait for texts to load from JSON
  const texts = await FIGROUND.ready;

  // Initialise tickers now that text data is available
  initTickers();
  updateTickers(0);

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Create panner nodes (stereo positioning)
  panners.odysseus = audioCtx.createStereoPanner();
  panners.siren = audioCtx.createStereoPanner();
  panners.odysseus.pan.setValueAtTime(PAN_ODYSSEUS_BASE, audioCtx.currentTime);
  panners.siren.pan.setValueAtTime(PAN_SIREN_BASE, audioCtx.currentTime);

  // Create gain nodes
  gains.odysseus = audioCtx.createGain();
  gains.siren = audioCtx.createGain();

  // Signal chain: source → gain → panner → destination
  gains.odysseus.connect(panners.odysseus);
  gains.siren.connect(panners.siren);
  panners.odysseus.connect(audioCtx.destination);
  panners.siren.connect(audioCtx.destination);

  // Apply initial crossfade (50/50)
  updateCrossfade(50);

  // Build the four streaming sources. Hidden <audio> elements live in
  // the DOM (some browsers — historically iOS Safari — only fully wire
  // up media playback for elements attached to a document).
  const loadingBar = document.getElementById('loadingBar');
  loadingBar.classList.add('visible');
  document.getElementById('status').textContent = 'Loading audio …';

  for (const lang of ['de', 'en']) {
    for (const role of ['odysseus', 'siren']) {
      const el = new Audio();
      el.preload = 'metadata';            // headers only, no audio bytes yet
      el.src = AUDIO_FILES[lang][role];
      el.style.display = 'none';
      document.body.appendChild(el);
      audioEls[lang][role] = el;

      // createMediaElementSource can be called once per element, full stop —
      // do it now so the graph is wired before first play. Setting preload
      // alone is enough to start the metadata fetch in the background.
      const src = audioCtx.createMediaElementSource(el);
      mediaSources[lang][role] = src;
      src.connect(gains[role]);

      // Odysseus is our primary clock; once it settles at the seek target,
      // drop the pendingSeekTarget override so getCurrentTime goes back to
      // reading the live element. Guard on "still active language" so a
      // language switch mid-flight doesn't clear a target that belongs to
      // the now-active pair.
      if (role === 'odysseus') {
        el.addEventListener('seeked', () => {
          if (audioEls[currentLang].odysseus === el) pendingSeekTarget = null;
        });
      }
    }
  }

  try {
    // Block on the active pair only — that's all we need to enable Play
    // and render the duration / strophe bars. The other language's
    // metadata resolves in the background and the language switch will
    // typically find it already cached.
    await Promise.all([
      waitForMetadata(audioEls[currentLang].odysseus),
      waitForMetadata(audioEls[currentLang].siren),
    ]);

    loadingBar.classList.remove('visible');
    document.getElementById('status').textContent = '';
    document.getElementById('btnPlay').disabled = false;

    // Apply detected language to UI
    FIGROUND.updateTitle(currentLang, ' — Audio');
    document.querySelector('.speaker-right').textContent = currentLang === 'de' ? 'Die Sirene' : 'The Siren';
    document.getElementById('btnDe').classList.toggle('active', currentLang === 'de');
    document.getElementById('btnEn').classList.toggle('active', currentLang === 'en');

    updateDuration();
    renderStropheBars();

    // While streaming: surface "Buffering …" if the network can't keep up,
    // clear it once playback resumes. Bound on every element so it works
    // in either language.
    for (const lang of ['de', 'en']) {
      for (const role of ['odysseus', 'siren']) {
        bindBufferingStatus(audioEls[lang][role]);
      }
    }
  } catch (e) {
    loadingBar.classList.remove('visible');
    document.getElementById('status').textContent =
      'Error loading audio. Please make sure the MP3 files are in the audio/ folder.';
    console.error(e);
  }
}

// Resolve once the audio element has its duration available. readyState
// >= 1 (HAVE_METADATA) means the loadedmetadata event has already fired,
// in which case we resolve immediately.
function waitForMetadata(el) {
  return new Promise((resolve, reject) => {
    if (el.readyState >= 1) return resolve();
    const onMeta = () => { cleanup(); resolve(); };
    const onErr  = () => { cleanup(); reject(new Error('audio load failed: ' + el.src)); };
    const cleanup = () => {
      el.removeEventListener('loadedmetadata', onMeta);
      el.removeEventListener('error', onErr);
    };
    el.addEventListener('loadedmetadata', onMeta);
    el.addEventListener('error', onErr);
  });
}

// "waiting" fires when the element is stalled needing more data; "playing"
// or "canplay" once it can resume. We only show the hint while the user
// is actively in playback — a paused stall is not visible to the user.
function bindBufferingStatus(el) {
  el.addEventListener('waiting', () => {
    if (isPlaying) document.getElementById('status').textContent = 'Buffering …';
  });
  el.addEventListener('playing', () => {
    document.getElementById('status').textContent = '';
  });
  el.addEventListener('canplay', () => {
    if (isPlaying) document.getElementById('status').textContent = '';
  });
}

// ── Crossfade ──

function updateCrossfade(value) {
  // value: 0 = full Odysseus, 100 = full Siren
  // Use equal-power crossfade
  const x = value / 100;
  const gainOdy = Math.cos(x * Math.PI / 2);
  const gainSir = Math.sin(x * Math.PI / 2);

  if (gains.odysseus) gains.odysseus.gain.setValueAtTime(gainOdy, audioCtx.currentTime);
  if (gains.siren) gains.siren.gain.setValueAtTime(gainSir, audioCtx.currentTime);

  // Dynamic stereo panning:
  // At center (x=0.5): voices sit at their base positions (L/R)
  // Focus Odysseus (x→0): Odysseus moves toward center, Siren pushed further right
  // Focus Siren (x→1): Siren moves toward center, Odysseus pushed further left
  if (panners.odysseus && panners.siren) {
    const panOdy = PAN_ODYSSEUS_BASE * (1 + x * 0.6);   // more left as siren focused
    const panSir = PAN_SIREN_BASE * (1 + (1 - x) * 0.6); // more right as odysseus focused
    panners.odysseus.pan.setValueAtTime(Math.max(-1, panOdy), audioCtx.currentTime);
    panners.siren.pan.setValueAtTime(Math.min(1, panSir), audioCtx.currentTime);
  }

  // Update labels
  document.getElementById('volLeft').textContent = Math.round(gainOdy * 100) + ' %';
  document.getElementById('volRight').textContent = Math.round(gainSir * 100) + ' %';

  // Update label opacity
  document.getElementById('volLeft').style.opacity = 0.4 + gainOdy * 0.6;
  document.getElementById('volRight').style.opacity = 0.4 + gainSir * 0.6;
}

document.getElementById('crossfade').addEventListener('input', function() {
  updateCrossfade(parseInt(this.value));
});

// ── Playback ──
// startPlayback() is idempotent w.r.t. position — it pushes the active
// pair to `offset` (or leaves them where they are if no offset is given,
// which is what togglePlay does for resume) and calls play() on both.
// We don't need an `ended` handler; updateProgress watches the clock
// and stops at duration. play() returns a Promise that can reject if
// the autoplay policy blocks us — togglePlay's audioCtx.resume() and
// the user gesture should prevent that, but we swallow the rejection
// just in case.

function startPlayback(offset) {
  const ody = audioEls[currentLang].odysseus;
  const sir = audioEls[currentLang].siren;

  if (typeof offset === 'number') {
    ody.currentTime = offset;
    sir.currentTime = offset;
  }

  ody.play().catch(err => console.warn('odysseus play failed:', err));
  sir.play().catch(err => console.warn('siren play failed:', err));

  isPlaying = true;
  lastDriftCheck = performance.now();
}

// Click + drag scrub on the progress bar. Pointer events unify mouse,
// touch and pen — pointerdown jumps to the position, subsequent
// pointermove (while the pointer is captured) live-scrubs. setPointerCapture
// keeps the gesture alive even when the cursor leaves the (3 px-tall)
// bar, which it inevitably will mid-drag.
(function setupProgressBarDrag() {
  const bar = document.getElementById('progressBg');
  let dragging = false;

  function targetFromEvent(e) {
    const rect = bar.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    return pct * getMaxDuration();
  }

  bar.addEventListener('pointerdown', (e) => {
    if (getMaxDuration() <= 0) return;
    dragging = true;
    bar.setPointerCapture(e.pointerId);
    seekTo(targetFromEvent(e));
    e.preventDefault();
  });
  bar.addEventListener('pointermove', (e) => {
    if (dragging) seekTo(targetFromEvent(e));
  });
  bar.addEventListener('pointerup', (e) => {
    if (!dragging) return;
    dragging = false;
    if (bar.hasPointerCapture(e.pointerId)) bar.releasePointerCapture(e.pointerId);
  });
  bar.addEventListener('pointercancel', () => { dragging = false; });
})();

// ── Language Switching ──
// No fetch / decode involved any more — we just pause + rewind the old
// pair and play the new one. Both pairs stay permanently connected to
// the gain bus, so the inactive pair is silent simply because it's
// paused. Metadata for the new pair is usually already loaded (init
// kicks off all four metadata fetches in parallel); on the off chance
// it isn't, waitForMetadata resolves quickly because the browser only
// needs the MP3 header.

function switchLang(lang) {
  if (lang === currentLang) return;
  const wasPlaying = isPlaying;

  if (isPlaying) {
    stopSources();
    isPlaying = false;
  }
  // Rewind the now-inactive pair so a later switch back starts from 0:00.
  audioEls[currentLang].odysseus.currentTime = 0;
  audioEls[currentLang].siren.currentTime    = 0;

  currentLang = lang;

  document.getElementById('btnDe').classList.toggle('active', lang === 'de');
  document.getElementById('btnEn').classList.toggle('active', lang === 'en');

  // Update title and speaker labels
  FIGROUND.updateTitle(lang, ' — Audio');
  document.querySelector('.speaker-right').textContent = lang === 'de' ? 'Die Sirene' : 'The Siren';

  // Reset play button (SVG + label)
  updatePlayButton();

  document.getElementById('timeCurrent').textContent = '0:00';
  document.getElementById('progressFill').style.width = '0%';
  initTickers();
  updateTickers(0);

  // Duration / strophe-bar geometry depends on the new pair's metadata.
  // It's almost always already loaded — but await it just in case.
  Promise.all([
    waitForMetadata(audioEls[lang].odysseus),
    waitForMetadata(audioEls[lang].siren),
  ]).then(() => {
    updateDuration();
    renderStropheBars();
    if (wasPlaying) {
      startPlayback(0);
      updatePlayButton();
    }
  }).catch(err => {
    console.error(err);
    document.getElementById('status').textContent = 'Error loading audio.';
  });
}

// ── Strophe Markers on Timeline ──

function renderStropheBars() {
  var odyContainer = document.getElementById('stropheBarsOdy');
  var sirContainer = document.getElementById('stropheBarsSir');
  odyContainer.innerHTML = '';
  sirContainer.innerHTML = '';

  var dur = getMaxDuration();
  if (dur === 0) return;

  var ts = AUDIO_TIMESTAMPS[currentLang];
  if (!ts) return;

  function addBars(voice, container, cssClass) {
    var entries = ts[voice];
    if (!entries) return;
    for (var i = 0; i < entries.length; i++) {
      var leftPct = (entries[i].start / dur) * 100;
      var widthPct = ((entries[i].end - entries[i].start) / dur) * 100;
      var bar = document.createElement('div');
      bar.className = 'strophe-bar ' + cssClass;
      bar.setAttribute('data-voice', voice);
      bar.setAttribute('data-index', i);
      bar.style.left = leftPct + '%';
      bar.style.width = Math.max(widthPct, 0.3) + '%';
      bar.title = voice + ' ' + (i + 1) + ' — ' + formatTime(entries[i].start) + '–' + formatTime(entries[i].end);
      (function(startSec) {
        bar.addEventListener('click', function(e) {
          e.stopPropagation();
          seekTo(startSec);
          // If we're not yet playing, start — clicking a strophe is
          // effectively "play me from here", so don't make the user
          // also press Play.
          if (!isPlaying) togglePlay();
        });
      })(entries[i].start);
      container.appendChild(bar);
    }
  }

  addBars('odysseus', odyContainer, 'strophe-bar-ody');
  addBars('siren', sirContainer, 'strophe-bar-sir');
}

function updateStropheHighlight(currentTime) {
  var ts = AUDIO_TIMESTAMPS[currentLang];
  if (!ts) return;

  var allBars = document.querySelectorAll('.strophe-bar');
  for (var i = 0; i < allBars.length; i++) {
    var voice = allBars[i].getAttribute('data-voice');
    var idx = parseInt(allBars[i].getAttribute('data-index'));
    var entry = ts[voice] && ts[voice][idx];
    if (entry && currentTime >= entry.start && currentTime <= entry.end) {
      allBars[i].classList.add('strophe-bar-active');
    } else {
      allBars[i].classList.remove('strophe-bar-active');
    }
  }
}

function seekTo(seconds) {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  var dur = getMaxDuration();
  if (dur <= 0) return;                       // metadata not loaded yet — bail
  var target = Math.max(0, Math.min(seconds, dur));

  // Override the clock reads until 'seeked' fires (init() sets up the
  // listener that clears this). Without this, the next animation frame
  // would read the audio element's still-stale currentTime and snap the
  // ticker / strophe highlight back to the old position.
  pendingSeekTarget = target;

  var ody = audioEls[currentLang].odysseus;
  var sir = audioEls[currentLang].siren;
  if (!ody || !sir) return;

  // Each track has its own duration — the shorter track's currentTime must
  // not be set past its end, otherwise some browsers reject the assignment
  // silently and the seek "doesn't take".
  var odyTarget = isNaN(ody.duration) ? target : Math.min(target, ody.duration);
  var sirTarget = isNaN(sir.duration) ? target : Math.min(target, sir.duration);
  try { ody.currentTime = odyTarget; } catch (e) { console.warn('odysseus seek failed:', e); }
  try { sir.currentTime = sirTarget; } catch (e) { console.warn('siren seek failed:', e); }

  // If the user was already playing, the browser may pause one or both
  // elements briefly while fetching the new byte range — kick them back
  // into play() so the seek doesn't leave us hanging in 'seeking' state.
  if (isPlaying) {
    if (ody.paused) ody.play().catch(err => console.warn('odysseus resume failed:', err));
    if (sir.paused) sir.play().catch(err => console.warn('siren resume failed:', err));
  }

  // Resync the drift timer so we don't immediately re-sync after the
  // user just placed both heads at the same spot.
  lastDriftCheck = performance.now();

  // Update UI immediately, regardless of play state. The next
  // updateProgress frame reads audioEl.currentTime — but with
  // preload="metadata" the browser may still be fetching the byte range
  // for the new position when that frame fires, so currentTime can lag
  // by a few ms. Pushing the visual state from `target` here makes the
  // jump feel instant, and updateProgress overwrites with the live
  // value once playback advances normally.
  document.getElementById('timeCurrent').textContent = formatTime(target);
  document.getElementById('progressFill').style.width = (target / dur * 100) + '%';
  updateTickers(target);
  updateStropheHighlight(target);
}

// Jump to the next (+1) or previous (-1) strophe boundary for a given voice
function jumpStrophe(voice, direction) {
  var ts = AUDIO_TIMESTAMPS[currentLang];
  if (!ts || !ts[voice]) return;
  var entries = ts[voice];
  var cur = getCurrentTime();

  if (direction > 0) {
    // Find the first strophe that starts after current time (with small tolerance)
    for (var i = 0; i < entries.length; i++) {
      if (entries[i].start > cur + 0.5) {
        seekTo(entries[i].start);
        return;
      }
    }
  } else {
    // Find the last strophe whose start is before current time (with tolerance)
    for (var i = entries.length - 1; i >= 0; i--) {
      if (entries[i].start < cur - 1.5) {
        seekTo(entries[i].start);
        return;
      }
    }
    seekTo(0);
  }
}

// Jump to next/previous strophe boundary (either voice, whichever comes first)
function jumpNext() {
  var ts = AUDIO_TIMESTAMPS[currentLang];
  if (!ts) return;
  var cur = getCurrentTime();
  var best = Infinity;

  for (var voice in ts) {
    var entries = ts[voice];
    for (var i = 0; i < entries.length; i++) {
      if (entries[i].start > cur + 0.5 && entries[i].start < best) {
        best = entries[i].start;
        break;
      }
    }
  }
  if (best < Infinity) seekTo(best);
}

function jumpPrev() {
  var ts = AUDIO_TIMESTAMPS[currentLang];
  if (!ts) return;
  var cur = getCurrentTime();
  var best = -1;

  for (var voice in ts) {
    var entries = ts[voice];
    for (var i = entries.length - 1; i >= 0; i--) {
      if (entries[i].start < cur - 1.5 && entries[i].start > best) {
        best = entries[i].start;
        break;
      }
    }
  }
  seekTo(best >= 0 ? best : 0);
}

// ── Progress update loop ──
// Two HTMLAudioElement instances each have their own clock and can drift
// over long playback (typically a few ms / minute, not perceptible in
// speech but worth correcting on principle). Once a minute we check the
// gap and snap the Siren to the Odysseus clock if it exceeds the
// threshold. Also handles the "we've reached the end" stop, which used
// to live in the BufferSourceNode `onended` handler.

let lastDriftCheck = 0;
const DRIFT_CHECK_INTERVAL_MS = 60000;
const DRIFT_THRESHOLD_S = 0.08;

function updateProgress() {
  var cur = getCurrentTime();
  var dur = getMaxDuration();
  var pct = dur > 0 ? Math.min(cur / dur, 1) : 0;

  if (isPlaying) {
    document.getElementById('progressFill').style.width = (pct * 100) + '%';
    document.getElementById('timeCurrent').textContent = formatTime(cur);

    // End-of-track stop — replaces the old BufferSourceNode onended.
    if (dur > 0 && cur >= dur - 0.05) {
      stopPlayback();
    } else {
      // Drift correction: every minute, pull Siren onto Odysseus's clock
      // if they've drifted apart. Cheap and rarely needed, but keeps long
      // listens precisely aligned. Guarded on both elements actually
      // playing so a buffering stall doesn't trigger a phantom jump.
      const now = performance.now();
      if (now - lastDriftCheck > DRIFT_CHECK_INTERVAL_MS) {
        lastDriftCheck = now;
        const ody = audioEls[currentLang].odysseus;
        const sir = audioEls[currentLang].siren;
        if (ody && sir && !ody.paused && !sir.paused &&
            !isNaN(ody.currentTime) && !isNaN(sir.currentTime)) {
          const diff = Math.abs(ody.currentTime - sir.currentTime);
          if (diff > DRIFT_THRESHOLD_S) {
            sir.currentTime = ody.currentTime;
          }
        }
      }
    }
  }

  // Always update tickers and strophe highlights (also when paused, for seek)
  updateTickers(cur);
  updateStropheHighlight(cur);

  requestAnimationFrame(updateProgress);
}

requestAnimationFrame(updateProgress);

// ── Start ──

init();
</script>
