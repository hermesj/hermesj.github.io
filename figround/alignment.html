<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure and Ground — Parallel</title>
<meta name="description" content="Figure and Ground — alignement view. Two coupled horizontal bands.">
<meta property="og:title" content="Figure and Ground — Parallel">
<meta property="og:description" content="Two coupled horizontal bands. Drag, scroll, or click to focus.">
<meta property="og:url" content="https://hermesj.github.io/figround/alignement.html">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="figround.css">
<style>
  /* ══════════════════════════════════════════════════════
     Alignement view — two horizontal tickers stacked vertically.
     Odysseus runs at reading pace; the Siren is coupled to him
     via a piecewise-linear map of paragraph-start offsets,
     so she speaks her 8 paragraphs in the same "wall-time"
     that Odysseus speaks his 5. Click a band to hand it the
     reading-speed autoplay; the other band follows.
     ══════════════════════════════════════════════════════ */

  html, body { height: 100%; }

  body {
    /* Same blue-spectrum gradient as Palimpsest and Focus: light on
       the Odysseus end, dark on the Siren end. The bands overlay only
       part of the page, so the gradient frames them top, bottom, and
       on the sides — visible "ground" behind the figures. */
    background: linear-gradient(to right,
      #f4f4f4 0%,
      #e4eaf0 15%,
      #98a8b8 42%,
      #3a4d66 72%,
      #0f1926 100%);
    display: flex;
    flex-direction: column;
    overflow: hidden;          /* bands scroll internally, not the page */
    user-select: none;
    -webkit-user-select: none;

    /* ── BAND TYPE + GEOMETRY ──
       Track font-size is the only authority — band height derives from
       it via the golden ratio, so resizing the type rescales everything
       in proportion. Padding above/below the text line equals 1.618 ×
       the text line-height, then the whole thing is halved so the bands
       read as slim ribbons rather than blocks: total band height
       = 1.4em × (1 + 2 × 1.618) / 2 ≈ 2.96em. */
    --track-fs: clamp(1.2rem, 1.65vw, 1.6rem);
    --line-h: 1.4;
    --band-h: calc(var(--track-fs) * var(--line-h) * (1 + 2 * 1.618) / 2);
  }

  /* ── TITLE ──
     Padding bumped (top + bottom) for breathing room beneath the
     shared header bar; font-size override scales the title 1.5× the
     base figround.css value (clamp(1.6rem, 3vw, 2.8rem)). */
  .main-title {
    padding: 1.5vh 0 1.5vh 0;
    font-size: clamp(2.4rem, 4.5vw, 4.2rem);
  }

  /* Tighten the explanation slab a touch so the bands don't lose
     too much vertical room on the constrained 100vh layout. */
  .shared-explanation {
    margin-top: 0;
    margin-bottom: 0.6em;
    padding: 0.65em 1.2em;
  }

  /* ── BANDS CONTAINER ──
     Fills the available vertical space below the title + explanation
     and the FULL viewport width — the bands run all the way to the
     screen edges (no margin, no border-radius), as if the text were
     spilling off-screen on both sides. The bands themselves are
     fixed-height (var(--band-h)); each band is preceded by its own
     .band-label heading; three .band-pad spacers soak up the leftover
     space using a 0.55 : 0.618 : 1 flex ratio. The middle gap stays at
     the φ-section value, the bottom margin keeps the full share, and
     the top margin is shrunk so the upper label sits closer to the
     page heading. */
  .bands {
    flex: 1;
    min-height: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: stretch;
  }

  .band-pad { flex: 1; min-height: 0; }
  .band-pad.pad-top { flex: 0.55; }   /* gap to page title — smaller = tighter */
  .band-pad.pad-mid {
    flex: 0.618;                      /* gap between the two band groups (φ-section) */
    position: relative;               /* anchors the chain SVG layer */
  }

  /* ── CHAIN LAYER ──
     Lives inside pad-mid (the gap between the two bands) and never spills
     into the band areas — the user's spec: "Die Ketten sieht man nur
     zwischen den Textboxen." Each chain anchors one fixed-character
     position in the slower text to its piecewise-linear partner in the
     faster text. At the viewport center the two anchors land on the
     same x-coordinate and the chain stands vertical; further out the
     faster text has already travelled more pixels per character, so its
     anchor offsets — and the chain tilts. Lines are redrawn on every
     applyTransforms() so the visual stays in sync with the bands. */
  .chain-layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: hidden;
  }
  .chain-layer line {
    stroke: #000;
    stroke-width: 2.8;
    stroke-linecap: round;
  }

  /* ── BAND LABEL ──
     Voice heading sitting just above its band. Sized like a main-title
     on the other views (figround.css base clamp). Odysseus reads black,
     the Siren reads white — each carries a soft glow in the opposite
     tone so the label stays readable across the page-wide gradient. */
  .band-label {
    flex: 0 0 auto;
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.2rem, 3vw, 2.0rem);
    font-weight: 600;
    letter-spacing: 0.04em;
    line-height: 1.1;
    padding: 0 0 0.18em 0;
    pointer-events: none;        /* clicks fall through to the band below */
  }
  .band-label-odysseus {
    color: #0f1926;
    text-shadow: 0 0 12px rgba(255,255,255,0.55),
                 0 0 24px rgba(255,255,255,0.35);
  }
  .band-label-siren {
    color: #eef2f6;
    text-shadow: 0 0 12px rgba(0,0,0,0.7),
                 0 0 24px rgba(0,0,0,0.4);
  }

  /* ── BAND ──
     One reading line each, height = var(--band-h) (golden-ratio padding,
     halved). Square corners that hug the viewport edges, so the band
     reads as an endless ribbon running off the screen — overflow:hidden
     still clips the inner edge-veil. `touch-action: none` claims drag +
     wheel input exclusively; the page never scrolls from a band gesture. */
  .band {
    position: relative;
    flex: 0 0 auto;
    width: 100%;
    height: var(--band-h);
    overflow: hidden;
    display: flex;
    align-items: center;
    border-radius: 0;
    cursor: grab;
    touch-action: none;
    font-size: var(--track-fs);   /* makes 1em on band == track type size */
    transition: box-shadow 0.35s ease;
  }
  .band:active { cursor: grabbing; }

  /* Swap toggles DOM order only — voice colors stay tied to voice.
     (The user's spec: "Positionen vertauschen. Farben bleiben.")
     Pads stay in slots 1, 4, 7. Each voice's label clings to its band
     on the OUTSIDE of the spread: top voice's label sits above its
     band, bottom voice's label sits below its band, so the chain layer
     in pad-mid (slot 4) is uninterrupted between the two bands. */
  .pad-top              { order: 1; }
  .band-label-odysseus  { order: 2; }   /* default: Odysseus on top, label above its band */
  .band-odysseus        { order: 3; }
  .pad-mid              { order: 4; }
  .band-siren           { order: 5; }
  .band-label-siren     { order: 6; }   /* default: Siren on bottom, label below its band */
  .pad-bottom           { order: 7; }
  body.swapped .band-label-siren     { order: 2; }
  body.swapped .band-siren           { order: 3; }
  body.swapped .band-odysseus        { order: 5; }
  body.swapped .band-label-odysseus  { order: 6; }

  /* Band colours follow the project's Odysseus-light / Siren-dark
     convention. Tones are pulled toward the middle of the palimpsest
     gradient (not the stark #f4f4f4 / #0f1926 extremes) so the bands
     feel like blue-grey slabs rather than paper-white + jet-black. */

  /* Odysseus = light band (muted blue-grey), dark text. */
  .band-odysseus {
    background: linear-gradient(to right,
      #bfcbd6 0%, #d3dde6 50%, #bfcbd6 100%);
  }
  /* Siren = dark band (muted midnight blue), light text. */
  .band-siren {
    background: linear-gradient(to right,
      #2e3f55 0%, #42566d 50%, #2e3f55 100%);
  }

  /* Focused band gets a subtle inner halo so the user knows which band
     the autoplay is driving. */
  .band-odysseus.focused {
    box-shadow: inset 0 0 60px rgba(40, 60, 85, 0.20);
  }
  .band-siren.focused {
    box-shadow: inset 0 0 60px rgba(200, 215, 230, 0.18);
  }

  /* Edge veil — the band's own background color fades across the text
     from the sides, making only a ~20%-wide center strip fully readable
     and the edges "blur" out. Pointer-events:none so drag still hits
     the band underneath. */
  .band-odysseus::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    background: linear-gradient(to right,
      rgba(191, 203, 214, 1)    0%,
      rgba(191, 203, 214, 0.88) 8%,
      rgba(191, 203, 214, 0.55) 20%,
      rgba(191, 203, 214, 0.15) 32%,
      rgba(191, 203, 214, 0)    42%,
      rgba(191, 203, 214, 0)    58%,
      rgba(191, 203, 214, 0.15) 68%,
      rgba(191, 203, 214, 0.55) 80%,
      rgba(191, 203, 214, 0.88) 92%,
      rgba(191, 203, 214, 1)    100%);
  }
  .band-siren::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    background: linear-gradient(to right,
      rgba(46, 63, 85, 1)    0%,
      rgba(46, 63, 85, 0.88) 8%,
      rgba(46, 63, 85, 0.55) 20%,
      rgba(46, 63, 85, 0.15) 32%,
      rgba(46, 63, 85, 0)    42%,
      rgba(46, 63, 85, 0)    58%,
      rgba(46, 63, 85, 0.15) 68%,
      rgba(46, 63, 85, 0.55) 80%,
      rgba(46, 63, 85, 0.88) 92%,
      rgba(46, 63, 85, 1)    100%);
  }

  /* ── TRACK ──
     The single line of text. Transformed via inline style in JS —
     `translateX(trackBase - offset px)`, where trackBase is measured
     once per track so offset=0 puts the subtitle's first glyph at
     horizontal viewport center regardless of the band's own x-position. */
  .band-track {
    position: relative;
    z-index: 1;
    white-space: nowrap;
    font-size: var(--track-fs);
    line-height: var(--line-h);
    letter-spacing: 0.02em;
    will-change: transform;
    padding: 0 1em;       /* keeps the subtitle off the very edge */
  }
  /* Odysseus = light band → dark text (black with a soft white glow). */
  .band-odysseus .band-track {
    color: #0f1926;
    font-weight: 500;
    text-shadow: 0 0 8px rgba(255,255,255,0.7), 0 0 16px rgba(255,255,255,0.35);
  }
  /* Siren = dark band → light text (off-white with a soft dark glow). */
  .band-siren .band-track {
    color: #eef2f6;
    font-weight: 400;
    text-shadow: 0 0 8px rgba(0,0,0,0.65), 0 0 16px rgba(0,0,0,0.35);
  }

  /* Inline typography inside the track. Subtitles are bold; song passages
     italic (matches the shared .song convention in figround.css). */
  .t-sub { font-weight: 700; letter-spacing: 0.04em; }
  .t-song { font-style: italic; }
  .t-sep {
    margin: 0 0.9em;
    opacity: 0.55;
    font-size: 0.85em;
  }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    /* Override --track-fs only — band height auto-recomputes from it.
       Bands stay full-width (no .bands override needed). */
    body { --track-fs: 1.3rem; }

    /* German title wraps ("Figur und" / "Hintergrund") like the other views. */
    .main-title.title-de {
      flex-wrap: wrap;
      justify-content: flex-start;
      padding-left: 4vw;
      padding-right: 4vw;
    }
    .title-de .word-right {
      flex-basis: 100%;
      text-align: right;
    }
  }
</style>
</head>
<body>

<!-- Title — header / explanation / footer are injected by
     FIGROUND.injectHeader at the bottom of the script below. -->
<div class="main-title">
  <span class="word-left" id="titleLeft">Figure</span>
  <span class="word-mid" id="titleMid">and</span>
  <span class="word-right" id="titleRight">Ground</span>
</div>

<!-- Bands. The top voice carries its label ABOVE its band, the bottom
     voice carries its label BELOW its band — leaving pad-mid between
     the two bands as a clean strip for the chain layer. CSS `order`
     reassigns the slots when Swap is toggled, so each label always
     stays attached to its own band on the outside of the pair. -->
<div class="bands" id="bands">
  <div class="band-pad pad-top"></div>
  <div class="band-label band-label-odysseus" data-en="Odysseus. The Siren. An Attempt." data-de="Odysseus. Die Sirene. Ein Versuch.">Odysseus. The Siren. An Attempt.</div>
  <div class="band band-odysseus" id="bandOdy" data-voice="odysseus">
    <div class="band-track" id="trackOdy"></div>
  </div>
  <div class="band-pad pad-mid">
    <svg class="chain-layer" id="chainLayer" aria-hidden="true"></svg>
  </div>
  <div class="band band-siren" id="bandSir" data-voice="siren">
    <div class="band-track" id="trackSir"></div>
  </div>
  <div class="band-label band-label-siren" data-en="The Song of the Siren." data-de="Das Lied der Sirene.">The Song of the Siren.</div>
  <div class="band-pad pad-bottom"></div>
</div>

<script src="figround.js"></script>
<script>
// Inject shared header + footer + explanation. Synchronous, runs
// before FIGROUND.ready resolves so btnDe/btnEn etc. exist by the
// time switchLang/swap reference them.
FIGROUND.injectHeader({
  showSwap: true,
  swapHandler: 'swap',
  explanation: {
    en: 'Two interlinked perspectives. Click a ribbon to set the reading speed, scroll to jump.',
    de: 'Zwei aneinander gekettete Perspektiven. Klicke ein Band für Lesegeschwindigkeit, scrolle um zu springen.'
  }
});

FIGROUND.ready.then(function (texts) {

  var trackOdy = document.getElementById('trackOdy');
  var trackSir = document.getElementById('trackSir');
  var bandOdy  = document.getElementById('bandOdy');
  var bandSir  = document.getElementById('bandSir');
  var chainLayer = document.getElementById('chainLayer');
  var explanation = document.getElementById('sharedExplanation');
  var fadeHint = explanation
    ? FIGROUND.createHintFader(explanation)
    : function () {};

  var currentLang = FIGROUND.detectLang();

  // ──────────────────────────────────────────────────────────
  // SCROLL-RANGE ANCHORS  ←  edit these to retune the visible
  //                          start / end of each band
  // ──────────────────────────────────────────────────────────
  // The leftmost scroll position centers `left.word` of each track at
  // the viewport center; the rightmost centers `right.word`. The bands
  // can't be scrolled past these bounds.
  //
  //   idx : 0..N = paragraph N (0-indexed). The voice subtitle now lives
  //                as a heading above the band, so paragraph 0 is the
  //                first chunk and the natural left-bound home.
  //   word: a substring inside that span; case-sensitive; first match wins.
  //
  // The two voices' anchors form one piecewise-linear pair, so when
  // Odysseus is at his `left` word, the Siren is automatically at hers
  // — and likewise at the right end. To nudge either bound, just change
  // the word string below.
  var SCROLL_ANCHORS = {
    de: {
      odysseus: { left: { idx: 0, word: 'In schwachen' },   right: { idx: 4, word: 'Frühjahr' } },
      siren:    { left: { idx: 0, word: 'Zärtlich weicht' }, right: { idx: 7, word: 'bleibt'   } }
    },
    en: {
      odysseus: { left: { idx: 0, word: 'In the' },     right: { idx: 4, word: 'spring'  } },
      siren:    { left: { idx: 0, word: 'Tender goes' }, right: { idx: 7, word: 'silence' } }
    }
  };

  // ── STATE ──
  // Per-voice scroll offset (pixels travelled from the start of the text).
  // offset = 0 → first glyph of the subtitle sits at viewport center.
  var state = {
    odysseus: { offset: 0 },
    siren:    { offset: 0 }
  };

  // anchors[voice].pts = 4-element array of offsets used as the piecewise
  // linear alignment map between voices. Order:
  //   [0]  left bound (centered on first two words of paragraph 0)
  //   [1]  middle anchor A             (Odys P2 start  ↔  Siren P5 start)
  //   [2]  middle anchor B             (Odys P3 start  ↔  Siren P6 start)
  //   [3]  right bound (centered on a tunable word late in the text)
  var anchors = {
    odysseus: { pts: [0, 0, 0, 0], end: 0 },
    siren:    { pts: [0, 0, 0, 0], end: 0 }
  };

  var viewCenter = window.innerWidth / 2;
  var autoplayVoice = null;
  var rafId = null;
  var lastT = 0;

  // Reading-pace target for the focused voice. Both voices are calibrated
  // to this rate independently (see calibrateSpeeds) — so when Odysseus is
  // focused, *his* text passes the center at 200 wpm, and when the Siren
  // is focused, *hers* does. The un-focused voice follows via the map.
  var TARGET_WPM = 200;
  var SPEED_ODY = 0;   // filled in by calibrateSpeeds()
  var SPEED_SIR = 0;

  // Per-track horizontal shift that puts offset-0 at viewport center.
  // Measured once after render (see recalcTrackBase) because the bands
  // are no longer full-width — the track's natural left edge depends
  // on the band's centered position in the viewport.
  var trackBase = { odysseus: 0, siren: 0 };

  // ── CHAIN ANCHORS ──
  // Each entry pairs one fixed track-local offset in the slower text
  // with the piecewise-mapped offset in the faster text. The list is
  // rebuilt whenever the anchor pts change (on render / resize / lang
  // switch); renderChains() then converts each pair to an SVG <line>
  // every frame using the bands' current scroll state.
  //
  // Spacing: every CHAIN_INTERVAL_CHARS characters of the slower text
  // (≈ 20). The faster text covers correspondingly more characters
  // per chain, so its anchors fan out in pixel space — which is what
  // tilts the chain lines further from the viewport center.
  var CHAIN_INTERVAL_CHARS = 20;
  var chainAnchors = [];

  // ── RENDER ─────────────────────────────────────────────────

  // Build the inline-span markup for a track. The voice subtitle is
  // shown as a heading above the band (not inside it), so we render
  // paragraphs only — paragraph 0 becomes the first chunk and our
  // offset origin. Song paragraphs become .t-song (italic), separators
  // are their own spans so paragraph-start offset measurements aren't
  // skewed by neighbouring whitespace.
  function renderTrack(voice, trackEl) {
    var parts = [];
    voice.paragraphs.forEach(function (p, i) {
      if (i > 0) parts.push('<span class="t-sep">\u25C6</span>');
      if (typeof p === 'object' && p.song) {
        parts.push('<span class="t-chunk t-song" data-idx="' + i + '">' +
          escapeHtml(p.text) + '</span>');
      } else {
        parts.push('<span class="t-chunk" data-idx="' + i + '">' +
          escapeHtml(p) + '</span>');
      }
    });
    trackEl.innerHTML = parts.join(' ');
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  // Measure paragraph-start offsets after render. offsetLeft is taken
  // relative to the FIRST chunk's offsetLeft (paragraph 0) so the
  // track's left padding drops out — offset 0 always means "first
  // glyph of paragraph 0".
  function computeAnchors(trackEl) {
    var firstSpan = trackEl.querySelector('.t-chunk');
    var base = firstSpan.offsetLeft;
    var pts = {};
    var all = trackEl.querySelectorAll('.t-chunk');
    all.forEach(function (el) {
      var idx = parseInt(el.getAttribute('data-idx'), 10);
      pts[idx] = el.offsetLeft - base;
    });
    var last = all[all.length - 1];
    pts.end = (last.offsetLeft + last.offsetWidth) - base;
    return pts;
  }

  // Find the offset (in track-local units, relative to paragraph 0
  // start) that puts a particular word at viewport center. Uses the
  // Range API to locate `cfg.word` inside the span at data-idx="cfg.idx",
  // measures the word's center via getBoundingClientRect, and converts
  // back into the same offset coordinate computeAnchors() returns. Caller
  // is responsible for setting both tracks' transform to translateX(0)
  // first, so getBoundingClientRect reads natural positions.
  function findWordOffset(trackEl, cfg) {
    var span = trackEl.querySelector('[data-idx="' + cfg.idx + '"]');
    if (!span) return null;
    var node = span.firstChild;
    if (!node || node.nodeType !== 3) return null;  // 3 = TEXT_NODE
    var i = node.textContent.indexOf(cfg.word);
    if (i < 0) return null;
    var range = document.createRange();
    range.setStart(node, i);
    range.setEnd(node, i + cfg.word.length);
    var rect = range.getBoundingClientRect();
    var baseLeft = trackEl.querySelector('.t-chunk')
                          .getBoundingClientRect().left;
    return (rect.left + rect.width / 2) - baseLeft;
  }

  // Build the four-anchor arrays from raw paragraph offsets, encoding
  // the user's alignment spec for the middle, plus the SCROLL_ANCHORS
  // word positions for the outer bounds:
  //   [0] left bound:   "In schwachen" / "Zärtlich weicht"   ← user-tunable
  //   [1] mid-anchor A: Odys P2-start ↔ Siren P5-start
  //   [2] mid-anchor B: Odys P3-start ↔ Siren P6-start
  //   [3] right bound:  "Frühjahr" / "bleibt"                ← user-tunable
  // Segments between anchors are interpolated linearly. Because both
  // voices share the same first / last anchor, clamping each voice to
  // its own [pts[0], pts[end]] range automatically lines the words up.
  // (Paragraph-0-start used to be a separate anchor, but with the
  // subtitle pulled out of the band the left bound now sits inside
  // paragraph 0 itself, so that intermediate anchor is gone.)
  function rebuildAnchors() {
    var ody  = computeAnchors(trackOdy);
    var sir  = computeAnchors(trackSir);
    var saOd = SCROLL_ANCHORS[currentLang].odysseus;
    var saSr = SCROLL_ANCHORS[currentLang].siren;

    // Word-based bounds — fall back to start/end of track if the word
    // can't be located (e.g. someone edits the config to a typo).
    var odyL = findWordOffset(trackOdy, saOd.left);
    var odyR = findWordOffset(trackOdy, saOd.right);
    var sirL = findWordOffset(trackSir, saSr.left);
    var sirR = findWordOffset(trackSir, saSr.right);
    if (odyL === null) odyL = 0;
    if (odyR === null) odyR = ody.end;
    if (sirL === null) sirL = 0;
    if (sirR === null) sirR = sir.end;

    anchors.odysseus.pts = [odyL, ody[2], ody[3], odyR];
    anchors.siren.pts    = [sirL, sir[5], sir[6], sirR];
    anchors.odysseus.end = ody.end;   // full track end (used by speed calibration)
    anchors.siren.end    = sir.end;
  }

  // Measure the horizontal shift each track needs so that offset 0 puts
  // paragraph 0's first glyph at viewport center. Must run with the
  // tracks at translateX(0) so getBoundingClientRect returns the natural
  // (un-transformed) position of the first chunk.
  function recalcTrackBase() {
    trackOdy.style.transform = 'translateX(0)';
    trackSir.style.transform = 'translateX(0)';
    var rOdy = trackOdy.querySelector('.t-chunk').getBoundingClientRect();
    var rSir = trackSir.querySelector('.t-chunk').getBoundingClientRect();
    trackBase.odysseus = viewCenter - rOdy.left;
    trackBase.siren    = viewCenter - rSir.left;
  }

  // Calibrate autoplay speeds so each focused voice reads at TARGET_WPM.
  // Rate = (words / sec) × (pixels / word). Pixels per word is measured
  // per voice from the actual rendered track width ÷ actual word count,
  // so changes to font-size, letter-spacing, or language all self-correct.
  function calibrateSpeeds() {
    var data = texts[currentLang];
    function wordCount(voice) {
      var w = voice.subtitle.trim().split(/\s+/).length;
      voice.paragraphs.forEach(function (p) {
        var t = (typeof p === 'object' && p.song) ? p.text : p;
        w += t.trim().split(/\s+/).length;
      });
      return w;
    }
    var pxPerWordOdy = anchors.odysseus.end / wordCount(data.odysseus);
    var pxPerWordSir = anchors.siren.end    / wordCount(data.siren);
    SPEED_ODY = (TARGET_WPM / 60) * pxPerWordOdy;
    SPEED_SIR = (TARGET_WPM / 60) * pxPerWordSir;
  }

  function render() {
    var data = texts[currentLang];
    FIGROUND.updateTitle(currentLang, ' — Parallel');

    // German title wraps on mobile — mirror the palimpsest/focus pattern.
    document.querySelector('.main-title').classList.toggle(
      'title-de', currentLang === 'de');

    renderTrack(data.odysseus, trackOdy);
    renderTrack(data.siren,    trackSir);

    document.getElementById('btnDe').className = (currentLang === 'de') ? 'active' : '';
    document.getElementById('btnEn').className = (currentLang === 'en') ? 'active' : '';

    // Localize nav + swap button labels (and the shared explanation).
    var els = document.querySelectorAll('[data-' + currentLang + ']');
    for (var i = 0; i < els.length; i++) {
      els[i].textContent = els[i].getAttribute('data-' + currentLang);
    }

    // Wait one frame so layout settles before we measure offsets.
    requestAnimationFrame(function () {
      // recalcTrackBase zeroes the transforms — required for both the
      // subtitle position read AND the Range-based word measurements
      // inside rebuildAnchors. Order matters here.
      recalcTrackBase();
      rebuildAnchors();
      calibrateSpeeds();
      buildChainAnchors();   // depends on anchors.*.pts / .end being current
      // Land both bands at the user-defined left bound. setOffset on
      // Odysseus drives Siren via the map, so she also lines up on her
      // own left-anchor word.
      setOffset('odysseus', anchors.odysseus.pts[0]);
    });
  }

  // ── MAPPING ───────────────────────────────────────────────
  // Piecewise linear interpolation: map x in src-anchor space to the
  // corresponding point in dst-anchor space. Before the first / after
  // the last anchor, clamps to the endpoint.
  function piecewiseMap(x, src, dst) {
    if (x <= src[0]) return dst[0];
    for (var i = 0; i < src.length - 1; i++) {
      var s0 = src[i], s1 = src[i + 1];
      if (x <= s1) {
        var span = s1 - s0;
        if (span <= 0) return dst[i + 1];
        var t = (x - s0) / span;
        return dst[i] + t * (dst[i + 1] - dst[i]);
      }
    }
    return dst[dst.length - 1];
  }

  function applyTransforms() {
    trackOdy.style.transform =
      'translateX(' + (trackBase.odysseus - state.odysseus.offset) + 'px)';
    trackSir.style.transform =
      'translateX(' + (trackBase.siren    - state.siren.offset)    + 'px)';
    renderChains();
  }

  // ── CHAIN BUILD / RENDER ───────────────────────────────────
  // Slower voice = the one whose track is shorter in pixels (both span
  // the same wall-time during autoplay, so a shorter track = fewer
  // pixels per second on screen). Chains are spaced at fixed character
  // intervals along the slower voice; the faster voice's matching
  // anchor is wherever piecewiseMap projects it. Rebuilds whenever
  // anchors.*.pts or anchors.*.end change.
  function buildChainAnchors() {
    chainAnchors = [];
    if (!texts || !texts[currentLang]) return;
    var slowVoice = (anchors.odysseus.end <= anchors.siren.end) ? 'odysseus' : 'siren';
    var fastVoice = (slowVoice === 'odysseus') ? 'siren' : 'odysseus';

    var slowData = texts[currentLang][slowVoice];
    var slowChars = 0;
    slowData.paragraphs.forEach(function (p) {
      var t = (typeof p === 'object' && p.song) ? p.text : p;
      slowChars += t.length;
    });
    if (slowChars <= 0 || anchors[slowVoice].end <= 0) return;

    var pxPerSlowChar = anchors[slowVoice].end / slowChars;
    var pxStep = CHAIN_INTERVAL_CHARS * pxPerSlowChar;
    if (pxStep <= 0) return;

    var slowPts = anchors[slowVoice].pts;
    var fastPts = anchors[fastVoice].pts;
    var slowMin = slowPts[0];
    var slowMax = slowPts[slowPts.length - 1];

    // Walk the slow track in pxStep increments. We also offset the
    // grid by the left bound's fractional remainder so the anchors
    // land at the *same* slow-text characters regardless of pts[0].
    var firstStep = Math.ceil(slowMin / pxStep) * pxStep;
    for (var slowOff = firstStep; slowOff <= slowMax; slowOff += pxStep) {
      var fastOff = piecewiseMap(slowOff, slowPts, fastPts);
      var anchorObj = {};
      anchorObj[slowVoice] = slowOff;
      anchorObj[fastVoice] = fastOff;
      chainAnchors.push(anchorObj);
    }
  }

  // Convert chain anchors to SVG <line> elements. Each anchor's screen
  // x-coordinate equals viewCenter + (track-local offset) − (current
  // state offset for that voice), because the track's transform places
  // its first chunk at viewCenter when offset = 0. SVG-local x =
  // screen_x minus the chain layer's bounding-rect left.
  var SVG_NS = 'http://www.w3.org/2000/svg';
  function renderChains() {
    if (!chainLayer) return;
    // Drop existing children — for chain counts in the low dozens this
    // is cheap enough not to bother with node pooling.
    while (chainLayer.firstChild) chainLayer.removeChild(chainLayer.firstChild);
    if (!chainAnchors.length) return;

    var rect = chainLayer.getBoundingClientRect();
    if (rect.width <= 0 || rect.height <= 0) return;

    var topVoice    = document.body.classList.contains('swapped') ? 'siren' : 'odysseus';
    var bottomVoice = (topVoice === 'odysseus') ? 'siren' : 'odysseus';

    var w = rect.width;
    var h = rect.height;
    var pad = 24;   // tolerate slight overshoot so partial-edge chains stay visible

    for (var i = 0; i < chainAnchors.length; i++) {
      var a = chainAnchors[i];
      var topX    = viewCenter + a[topVoice]    - state[topVoice].offset    - rect.left;
      var bottomX = viewCenter + a[bottomVoice] - state[bottomVoice].offset - rect.left;

      // Cull chains where both endpoints lie clearly outside the layer.
      if ((topX < -pad && bottomX < -pad) ||
          (topX > w + pad && bottomX > w + pad)) continue;

      var line = document.createElementNS(SVG_NS, 'line');
      line.setAttribute('x1', topX.toFixed(1));
      line.setAttribute('y1', '0');
      line.setAttribute('x2', bottomX.toFixed(1));
      line.setAttribute('y2', h.toFixed(1));
      chainLayer.appendChild(line);
    }
  }

  // Set the offset of `voice` (the one the user just touched) and
  // derive the other voice via the piecewise map, so the two texts
  // stay in alignment. Clamps at the user-tunable word anchors —
  // pts[0] (left bound) and pts[len-1] (right bound).
  function setOffset(voice, offset) {
    var pts = anchors[voice].pts;
    var min = pts[0];
    var max = pts[pts.length - 1];
    var clamped = Math.max(min, Math.min(max, offset));
    state[voice].offset = clamped;

    var other = voice === 'odysseus' ? 'siren' : 'odysseus';
    var mapped = piecewiseMap(clamped, pts, anchors[other].pts);
    state[other].offset = mapped;
    applyTransforms();
  }

  // ── AUTOPLAY ──────────────────────────────────────────────
  function startAutoplay(voice) {
    if (autoplayVoice === voice) { stopAutoplay(); return; }
    stopAutoplay();
    autoplayVoice = voice;
    // If we're sitting at (or past) the right bound, rewind to the
    // left bound so clicking a finished band restarts from the top
    // instead of ending immediately.
    var pts = anchors[voice].pts;
    var max = pts[pts.length - 1];
    if (state[voice].offset >= max - 1) {
      setOffset(voice, pts[0]);
    }
    bandEl(voice).classList.add('focused');
    lastT = 0;
    rafId = requestAnimationFrame(autoplayLoop);
  }

  function stopAutoplay() {
    if (autoplayVoice) bandEl(autoplayVoice).classList.remove('focused');
    autoplayVoice = null;
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  }

  function bandEl(voice) {
    return voice === 'odysseus' ? bandOdy : bandSir;
  }

  function autoplayLoop(t) {
    if (!autoplayVoice) return;
    var dt = lastT ? (t - lastT) : 16;
    lastT = t;
    var speed = autoplayVoice === 'odysseus' ? SPEED_ODY : SPEED_SIR;
    var newOff = state[autoplayVoice].offset + speed * dt / 1000;
    var pts = anchors[autoplayVoice].pts;
    var max = pts[pts.length - 1];
    if (newOff >= max) {
      setOffset(autoplayVoice, max);
      stopAutoplay();
      return;
    }
    setOffset(autoplayVoice, newOff);
    rafId = requestAnimationFrame(autoplayLoop);
  }

  // ── INTERACTION ───────────────────────────────────────────
  // Each band handles its own pointer + wheel input. A small movement
  // threshold separates "click" from "drag": clicks toggle autoplay
  // focus on that band; drags manually seek (and cancel autoplay).
  function bindBand(band, voice) {
    var downX = 0;
    var downOff = 0;
    var pointerDown = false;
    var moved = false;
    var activePointerId = null;

    band.addEventListener('pointerdown', function (e) {
      fadeHint();
      pointerDown = true;
      moved = false;
      downX = e.clientX;
      downOff = state[voice].offset;
      activePointerId = e.pointerId;
      band.setPointerCapture(e.pointerId);
    });

    band.addEventListener('pointermove', function (e) {
      if (!pointerDown || e.pointerId !== activePointerId) return;
      var dx = e.clientX - downX;
      if (!moved && Math.abs(dx) > 5) {
        moved = true;
        stopAutoplay();   // a real drag takes over from autoplay
      }
      if (moved) {
        // Drag right → text slides right → offset decreases (we go back).
        setOffset(voice, downOff - dx);
      }
    });

    function endPointer(e) {
      if (!pointerDown) return;
      if (e.pointerId !== undefined && e.pointerId !== activePointerId) return;
      pointerDown = false;
      activePointerId = null;
      if (!moved) {
        // No drag — treat as a click: toggle autoplay focus.
        startAutoplay(voice);
      }
    }

    band.addEventListener('pointerup', endPointer);
    band.addEventListener('pointercancel', endPointer);

    band.addEventListener('wheel', function (e) {
      // Capture the wheel so the page doesn't try to scroll. Both axes
      // are accepted: trackpads often send horizontal; mice send vertical.
      e.preventDefault();
      fadeHint();
      stopAutoplay();
      var dy = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
      setOffset(voice, state[voice].offset + dy);
    }, { passive: false });
  }

  bindBand(bandOdy, 'odysseus');
  bindBand(bandSir, 'siren');

  // ── LANG SWITCH ──
  window.switchLang = function (lang) {
    currentLang = lang;
    stopAutoplay();
    render();
  };

  // ── SWAP ──
  // Flips the two bands' DOM order (via CSS flex `order`), which moves
  // Odysseus from top to bottom and vice versa. Colors stay bound to
  // voice, per the user's spec: "Positionen vertauschen. Farben bleiben."
  // Re-render chains so each line connects the correct top/bottom voice.
  window.swap = function () {
    document.body.classList.toggle('swapped');
    renderChains();
  };

  // ── RESIZE ──
  window.addEventListener('resize', function () {
    viewCenter = window.innerWidth / 2;
    // Font clamp + layout changes shift paragraph offsets and the
    // per-track base — re-measure both, and re-derive reading speed
    // since pixels-per-word depends on the rendered font size. Order
    // mirrors render(): recalcTrackBase zeroes the transforms before
    // rebuildAnchors does its Range-based word measurements.
    requestAnimationFrame(function () {
      recalcTrackBase();
      rebuildAnchors();
      calibrateSpeeds();
      buildChainAnchors();
      applyTransforms();
    });
  });

  // ── INIT ──
  render();
});
</script>

</body>
</html>
