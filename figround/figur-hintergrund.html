<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figur und Hintergrund</title>
<meta name="description" content="Figur und Hintergrund — zwei parallele Prosatexte zum Mythos von Odysseus und der Sirene, als ineinander verschränktes visuelles Poster.">
<meta property="og:title" content="Figur und Hintergrund">
<meta property="og:description" content="Zwei parallele Prosatexte zum Mythos von Odysseus und der Sirene — visuelles Poster.">
<meta property="og:image" content="https://hermesj.github.io/figround/images/og-image-german.png">
<meta property="og:url" content="https://hermesj.github.io/figround/figur-hintergrund.html">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="poster.css">
</head>
<body>

<div class="poster">

  <div class="main-title">
    <span class="word-left" id="titleLeft">Figur</span>
    <span class="word-mid" id="titleMid">und</span>
    <span class="word-right" id="titleRight">Hintergrund</span>
  </div>

  <div class="subtitle-row">
    <div class="subtitle-left" id="subtitleLeft"></div>
    <div class="subtitle-right" id="subtitleRight"></div>
  </div>

  <div class="interleave">
    <div class="col-odysseus" id="colOdy"></div>
    <div class="col-siren" id="colSir"></div>
  </div>

</div>

<script src="figround.js"></script>
<script>
FIGROUND.ready.then(function(texts) {
  var data = texts.de;
  document.getElementById('subtitleLeft').textContent = data.odysseus.subtitle;
  document.getElementById('subtitleRight').textContent = data.siren.subtitle;
  document.getElementById('colOdy').innerHTML = FIGROUND.renderParagraphs(data.odysseus.paragraphs);
  document.getElementById('colSir').innerHTML = FIGROUND.renderParagraphs(data.siren.paragraphs);
});
</script>

</body>
</html>
