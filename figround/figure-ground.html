<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure and Ground</title>
<link rel="stylesheet" href="poster.css">
</head>
<body>

<div class="poster">

  <div class="main-title">
    <span class="word-left" id="titleLeft">Figure</span>
    <span class="word-mid" id="titleMid">and</span>
    <span class="word-right" id="titleRight">Ground</span>
  </div>

  <div class="subtitle-row">
    <div class="subtitle-left" id="subtitleLeft"></div>
    <div class="subtitle-right" id="subtitleRight"></div>
  </div>

  <div class="interleave">
    <div class="col-odysseus" id="colOdy"></div>
    <div class="col-siren" id="colSir"></div>
  </div>

</div>

<script src="texts.js"></script>
<script>
(function () {
  var urlLang = new URLSearchParams(window.location.search).get('lang');
  var lang = (urlLang === 'de' || urlLang === 'en') ? urlLang : 'en';
  var data = FIGROUND[lang];

  document.documentElement.lang = lang;
  document.title = data.title.join(' ');
  document.getElementById('titleLeft').textContent = data.title[0];
  document.getElementById('titleMid').textContent = data.title[1];
  document.getElementById('titleRight').textContent = data.title[2];
  document.getElementById('subtitleLeft').textContent = data.odysseus.subtitle;
  document.getElementById('subtitleRight').textContent = data.siren.subtitle;
  document.getElementById('colOdy').innerHTML = FIGROUND.renderParagraphs(data.odysseus.paragraphs);
  document.getElementById('colSir').innerHTML = FIGROUND.renderParagraphs(data.siren.paragraphs);
})();
</script>

</body>
</html>
